# OPTIONAL / ALTERNATIVE PATH — see deployment.yaml.
# CPU autoscaling will rarely trigger for static nginx; this exists for
# burst headroom only.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: paced-web }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: paced-web }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
