    // ════════════════════════════════════════════════════════════════
    // DATA LAYER  (alles via db.* zodat Supabase-swap straks 1 plek is)
    // ════════════════════════════════════════════════════════════════
    const db = {
      saveTeam(team)     { localStorage.setItem(`td:team:${team.id}`, JSON.stringify(team)); this._touchRecent(team.id); },
      getTeam(id)        { try { const r = localStorage.getItem(`td:team:${id}`); if (!r) return null; const t = JSON.parse(r); if (!t.fines) t.fines = { rules: [], entries: [] }; if (!t.fines.rules) t.fines.rules = []; if (!t.fines.entries) t.fines.entries = []; if (!t.settings) t.settings = { yellowSuspensionAt: 5 }; return t; } catch { return null; } },
      saveMatch(match)   { localStorage.setItem(`td:match:${match.id}`, JSON.stringify(match)); },
      getMatch(id) {
        try {
          const r = localStorage.getItem(`td:match:${id}`);
          if (r) return JSON.parse(r);
          // Shared link: try decoding ?d= param from URL hash
          const hashQ = window.location.hash.split('?')[1];
          if (hashQ) {
            const raw = hashQ.match(/(?:^|&)d=([^&]*)/)?.[1];
            if (raw) {
              let b64 = raw.replace(/-/g, '+').replace(/_/g, '/');
              const pad = b64.length % 4; if (pad) b64 += '='.repeat(4 - pad);
              const decoded = JSON.parse(decodeURIComponent(atob(b64)));
              const m = decoded?.m || decoded;
              const t = decoded?.t;
              if (m && m.id === id) {
                if (t && t.id && !localStorage.getItem(`td:team:${t.id}`)) {
                  if (!t.fines) t.fines = { rules: [], entries: [] };
                  if (!t.settings) t.settings = { yellowSuspensionAt: 5 };
                  if (!t.matchIds) t.matchIds = [];
                  if (!t.matchIds.includes(m.id)) t.matchIds.push(m.id);
                  this.saveTeam(t);
                }
                this.saveMatch(m);
                return m;
              }
            }
          }
          return null;
        } catch { return null; }
      },
      deleteMatch(id, teamId) {
        localStorage.removeItem(`td:match:${id}`);
        if (teamId) {
          const t = this.getTeam(teamId);
          if (t) { t.matchIds = (t.matchIds || []).filter(mid => mid !== id); this.saveTeam(t); }
        }
      },
      getTeamMatches(team) { return (team.matchIds || []).map(id => this.getMatch(id)).filter(Boolean); },
      getRecentTeams() { try { return JSON.parse(localStorage.getItem('td:recent') || '[]'); } catch { return []; } },
      _touchRecent(teamId) {
        const recent = this.getRecentTeams().filter(id => id !== teamId);
        recent.unshift(teamId);
        localStorage.setItem('td:recent', JSON.stringify(recent.slice(0, 8)));
      },
      uid() {
        const a = 'abcdefghijklmnopqrstuvwxyz0123456789';
        return Array.from({ length: 8 }, () => a[Math.floor(Math.random() * a.length)]).join('');
      },
    };

    // ════════════════════════════════════════════════════════════════
    // ROUTER
    // ════════════════════════════════════════════════════════════════
    function useRouter() {
      const [hash, setHash] = useState(window.location.hash);
      useEffect(() => {
        const fn = () => setHash(window.location.hash);
        window.addEventListener('hashchange', fn);
        return () => window.removeEventListener('hashchange', fn);
      }, []);
      return { hash, go: (h) => { window.location.hash = h; window.scrollTo(0, 0); } };
    }
    function parseRoute(hash) {
      if (hash.startsWith('#team-')) {
        const rest = hash.slice(6);
        if (rest.includes('/new-match')) return { name: 'newMatch', teamId: rest.split('/')[0] };
        return { name: 'team', teamId: rest.split('?')[0] };
      }
      if (hash.startsWith('#match-')) return { name: 'match', matchId: hash.slice(7).split('?')[0] };
      return { name: 'home' };
    }

    // Bereken statistieken voor topscorers etc.
    function computeStats(team, matches) {
      const stats = {};
      (team.players || []).forEach(p => {
        stats[p.id] = { player: p, goals: 0, assists: 0, motm: 0, yellow: 0, red: 0, played: 0 };
      });
      let wins = 0, draws = 0, losses = 0, gf = 0, ga = 0, played = 0;
      matches.forEach(m => {
        if (!m.result?.played) return;
        played++;
        const us = m.result.isHome ? m.result.homeScore : m.result.awayScore;
        const them = m.result.isHome ? m.result.awayScore : m.result.homeScore;
        gf += us; ga += them;
        if (us > them) wins++; else if (us < them) losses++; else draws++;
        const lineupIds = new Set(Object.values(m.lineup?.positions || {}).filter(Boolean));
        lineupIds.forEach(id => { if (stats[id]) stats[id].played++; });
        (m.result.goals || []).forEach(g => {
          if (stats[g.scorerId]) stats[g.scorerId].goals++;
          if (g.assistId && stats[g.assistId]) stats[g.assistId].assists++;
        });
        (m.result.cards || []).forEach(c => {
          if (stats[c.playerId]) stats[c.playerId][c.type === 'red' ? 'red' : 'yellow']++;
        });
        if (m.result.motmId && stats[m.result.motmId]) stats[m.result.motmId].motm++;
      });
      return {
        team: { played, wins, draws, losses, gf, ga, gd: gf - ga, points: wins*3 + draws },
        players: Object.values(stats).sort((a,b) => b.goals - a.goals || b.assists - a.assists || b.played - a.played),
      };
    }

             style={{ left: '50%', transform: 'translateX(-50%)' }}>
          <CheckCircle size={15} />{message}

    function Modal({ children, onClose, maxWidth='max-w-sm' }) {
      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/70 backdrop-blur-sm sm:items-center"
             onClick={(e) => e.target === e.currentTarget && onClose()}>
          <div className={`anim-slide-up w-full ${maxWidth} max-h-[88vh] overflow-y-auto no-scrollbar rounded-t-3xl border border-slate-700 bg-slate-800 p-6 sm:rounded-3xl`}>
            <div className="mx-auto mb-5 h-1 w-10 rounded-full bg-slate-600 sm:hidden" />

          </div>
        </div>
      );

    function NameModal({ title, subtitle, cta, theme='orange', onConfirm, onCancel }) {
      const [name, setName] = useState('');
      const ref = useRef(null);
      const c = COLORS[theme];
      useEffect(() => { const t = setTimeout(() => ref.current?.focus(), 60); return () => clearTimeout(t); }, []);
      return (
        <Modal onClose={onCancel}>
          <h3 className="text-white font-bold text-lg">{title}</h3>
          {subtitle && <p className="mt-1 text-slate-400 text-sm">{subtitle}</p>}
          <input ref={ref} type="text" placeholder="Je naam…" value={name} maxLength={30}
            onChange={(e) => setName(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && name.trim() && onConfirm(name.trim())}
            className={`mt-4 mb-4 w-full rounded-2xl border border-slate-600 bg-slate-700/80 px-4 py-3.5 text-white outline-none focus:border-${theme}-500 focus:ring-2 focus:${c.ring}`} />
          <div className="flex gap-3">
            <button onClick={onCancel} className="flex-1 rounded-2xl bg-slate-700 py-3.5 text-slate-300 font-semibold hover:bg-slate-600 active:scale-95 transition-all">Annuleer</button>
            <button onClick={() => name.trim() && onConfirm(name.trim())} disabled={!name.trim()}
              className={`flex-1 rounded-2xl ${c.solid} py-3.5 text-white font-bold disabled:opacity-40 active:scale-95 transition-all`}>{cta}</button>
          </div>
        </Modal>
      );
    }

    function Tabs({ tabs, active, onChange, theme='orange' }) {
      const c = COLORS[theme];
      return (
        <div role="tablist" className="flex gap-1 p-1 rounded-2xl bg-slate-800/80 border border-slate-700">
          {tabs.map(t => (
            <button key={t.id} role="tab" aria-selected={active === t.id} onClick={() => onChange(t.id)}
              className={`flex-1 flex items-center justify-center gap-1.5 rounded-xl py-2.5 text-xs font-bold transition-all ${active === t.id ? `${c.solid} text-white shadow-lg` : 'text-slate-400 hover:text-white'}`}>
              {t.icon}<span>{t.label}</span>
            </button>
          ))}
        </div>
      );
    }

    function ProgressBar({ current, total, label, theme='orange' }) {
      const c = COLORS[theme];
      const pct = total > 0 ? Math.min((current / total) * 100, 100) : 0;
      const full = current >= total && total > 0;
      return (
        <div>
          <div className="mb-2 flex items-center justify-between text-sm">
            <span className="text-slate-400 font-medium">{label}</span>
            <span className={`font-bold tabular-nums ${full ? 'text-green-400' : c.text}`}>{current}/{total}{full ? ' ✓' : ''}</span>
          </div>
          <div className="h-2.5 overflow-hidden rounded-full bg-slate-700">
            <div className="h-full rounded-full transition-all duration-700 ease-out"
              style={{ width: `${pct}%`, background: full ? 'linear-gradient(to right, #22c55e, #10b981)' : c.hex }} />
          </div>
        </div>
      );
    }

    // Speler-kiezer modal (gebruikt voor opstelling, doelpunten etc.)
    function PlayerPicker({ title, players, selected = null, exclude = [], allowNone = false, onPick, onCancel, theme = 'orange' }) {
      const [filter, setFilter] = useState('');
      const c = COLORS[theme];
      const list = players.filter(p =>
        !exclude.includes(p.id) &&
        (!filter || p.name.toLowerCase().includes(filter.toLowerCase()) || (p.number || '').toString().includes(filter))
      );
      return (
        <Modal onClose={onCancel}>
          <h3 className="text-white font-bold text-lg mb-3">{title}</h3>
          {players.length > 4 && (
            <input type="text" placeholder="Zoek…" value={filter} onChange={(e) => setFilter(e.target.value)}
              className={`mb-3 w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-sm text-white outline-none focus:border-${theme}-500`} />
          )}
          {players.length === 0 && (
            <p className="py-6 text-center text-sm text-slate-500">Nog geen spelers in selectie. Voeg eerst spelers toe.</p>
          )}
          <div className="space-y-1.5 max-h-[55vh] overflow-y-auto no-scrollbar">
            {allowNone && (
              <button onClick={() => onPick(null)}
                className="w-full flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-3 text-left hover:bg-slate-700 transition-colors">
                <div className="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-slate-700 text-slate-400">—</div>
                <span className="text-slate-400 text-sm font-medium">Geen / leeg laten</span>
              </button>
            )}
            {list.map(p => (
              <button key={p.id} onClick={() => onPick(p.id)}
                className={`w-full flex items-center gap-3 rounded-xl px-3 py-3 text-left transition-all ${selected === p.id ? `${c.solid} text-white` : 'bg-slate-700/40 text-white hover:bg-slate-700'}`}>
                <div className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-full font-black text-sm ${selected === p.id ? 'bg-white/20 text-white' : `${c.solid} text-white`}`}>
                  {p.number || initials(p.name)}

                <span className="font-semibold flex-1 truncate">{p.name}</span>
                {selected === p.id && <CheckCircle size={16} />}

          <button onClick={onCancel} className="mt-4 w-full rounded-2xl bg-slate-700 py-3 text-slate-300 font-semibold hover:bg-slate-600">Sluiten</button>

    const Pitch = memo(function Pitch({ formation, positions, players, onPositionTap, theme = 'orange' }) {
      const fm = FORMATIONS[formation];

      return (

            {/* Kader */}
            <rect x="2" y="2" width="96" height="146" fill="none" stroke="white" strokeWidth="0.5" opacity="0.8" />
            {/* Middencirkel + lijn */}
            <line x1="2" y1="75" x2="98" y2="75" stroke="white" strokeWidth="0.4" opacity="0.8" />
            <circle cx="50" cy="75" r="9" fill="none" stroke="white" strokeWidth="0.4" opacity="0.8" />
            <circle cx="50" cy="75" r="0.8" fill="white" opacity="0.8" />
            {/* Strafschopgebied onder (eigen helft) */}
            <rect x="22" y="124" width="56" height="22" fill="none" stroke="white" strokeWidth="0.4" opacity="0.8" />
            <rect x="36" y="138" width="28" height="8" fill="none" stroke="white" strokeWidth="0.4" opacity="0.8" />
            {/* Strafschopgebied boven (tegenstander) */}
            <rect x="22" y="2" width="56" height="22" fill="none" stroke="white" strokeWidth="0.4" opacity="0.8" />
            <rect x="36" y="2" width="28" height="8" fill="none" stroke="white" strokeWidth="0.4" opacity="0.8" />
            {/* Hoekschoppen */}
            <path d="M 2,5 A 3 3 0 0 1 5 2" fill="none" stroke="white" strokeWidth="0.3" opacity="0.6" />
            <path d="M 95,2 A 3 3 0 0 1 98 5" fill="none" stroke="white" strokeWidth="0.3" opacity="0.6" />
            <path d="M 2,145 A 3 3 0 0 0 5 148" fill="none" stroke="white" strokeWidth="0.3" opacity="0.6" />
            <path d="M 95,148 A 3 3 0 0 0 98 145" fill="none" stroke="white" strokeWidth="0.3" opacity="0.6" />
            {/* Posities */}
            {fm.positions.map(pos => {

              const player = players.find(p => p.id === playerId);

                    <text x={pos.x} y={cy + 11} textAnchor="middle" fontSize="3.2" fontWeight="700" fill="white"

                      {player.name.split(' ')[0]}

                  ) : (
                    <text x={pos.x} y={cy + 11} textAnchor="middle" fontSize="2.6" fill="white" opacity="0.7">{pos.label}</text>

    // WELCOME / HOME
    // ════════════════════════════════════════════════════════════════
    function WelcomeView({ onCreateTeam, onOpenTeam }) {
      const recent = db.getRecentTeams().map(id => db.getTeam(id)).filter(Boolean);

      const exportData = () => {
        const data = {};
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (k.startsWith('td:')) data[k] = localStorage.getItem(k);
        }
        const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        Object.assign(document.createElement('a'), {
          href: url, download: `teamdrive-backup-${new Date().toISOString().slice(0,10)}.json`
        }).click();
        URL.revokeObjectURL(url);
      };

      const importData = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            let count = 0;
            Object.entries(data).forEach(([k, v]) => { if (k.startsWith('td:')) { localStorage.setItem(k, v); count++; } });
            if (count > 0) window.location.reload(); else alert('Geen geldige data gevonden in bestand.');
          } catch { alert('Ongeldig bestand — selecteer een TeamDrive backup (.json).'); }
        };
        reader.readAsText(file);
      };

      return (
        <div className="min-h-screen bg-slate-950 pb-14">
          <div className="relative overflow-hidden bg-gradient-to-br from-orange-600 via-orange-500 to-amber-500 px-5 pt-14 pb-12">
            <div className="absolute -top-12 -right-12 h-52 w-52 rounded-full bg-white/10" />
            <div className="absolute -bottom-20 -left-10 h-44 w-44 rounded-full bg-black/10" />
            <div className="relative">
              <div className="mb-4 inline-flex items-center gap-1.5 rounded-full bg-black/20 px-3.5 py-1.5">
                <Zap size={13} className="text-white" />
                <span className="text-xs font-black tracking-widest text-white">TEAMDRIVE</span>
              </div>
              <h1 className="text-4xl font-black leading-none text-white">De app voor<br/>jouw team ⚽</h1>
              <p className="mt-2 text-sm text-white/80">Carpool · opstelling · uitslagen · boete-pot</p>
            </div>
          </div>
          <div className="px-4 -mt-5 space-y-4">
            <button onClick={onCreateTeam}
              className="anim-slide-up w-full rounded-2xl bg-gradient-to-r from-orange-500 to-amber-500 py-5 text-white font-black text-lg shadow-2xl shadow-orange-500/30 hover:shadow-orange-500/50 active:scale-95 transition-all">
              ⚡ Nieuw team maken
            </button>
            {recent.length > 0 && (
              <div className="rounded-2xl bg-slate-800 border border-slate-700 p-5">
                <p className="mb-3 text-xs font-bold uppercase tracking-widest text-slate-500">Recente teams</p>
                <div className="space-y-2">
                  {recent.map(team => {
                    const c = COLORS[team.color || 'orange'];
                    return (
                      <button key={team.id} onClick={() => onOpenTeam(team.id)}
                        className="w-full flex items-center gap-3 rounded-xl bg-slate-700/50 hover:bg-slate-700 px-4 py-3.5 transition-colors active:scale-[0.98]">
                        <div className={`flex h-11 w-11 shrink-0 items-center justify-center rounded-xl ${c.solid} text-white font-black text-sm`}>
                          {initials(team.name)}
                        </div>
                        <div className="flex-1 text-left min-w-0">
                          <p className="text-white font-bold truncate">{team.name}</p>
                          <p className="text-xs text-slate-500">{(team.players || []).length} sp. · {(team.matchIds || []).length} wedstr.</p>
                        </div>
                        <ChevronRight size={16} className="text-slate-500 shrink-0" />
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
            {recent.length === 0 && (
              <div className="grid grid-cols-2 gap-3">
                {[
                  { icon: '🚗', title: 'Carpool', desc: 'Samen rijden regelen' },
                  { icon: '⚽', title: 'Opstelling', desc: 'Formatie bepalen' },
                  { icon: '🏆', title: 'Topscorers', desc: 'Stats bijhouden' },
                  { icon: '💰', title: 'Boete-pot', desc: 'Straf per overtreding' },
                ].map(f => (
                  <div key={f.title} className="rounded-2xl bg-slate-800/80 border border-slate-700/60 p-4">
                    <div className="text-2xl mb-2">{f.icon}</div>
                    <p className="text-white font-bold text-sm leading-tight">{f.title}</p>
                    <p className="text-slate-500 text-xs mt-0.5">{f.desc}</p>
                  </div>
                ))}
              </div>
            )}
            <div className="flex items-center justify-center gap-3 text-slate-700">
              <span className="text-xs">🔒 Geen account</span>
              <span className="text-slate-800">·</span>
              <span className="text-xs">📱 Lokale opslag</span>
              <span className="text-slate-800">·</span>
              <span className="text-xs">🔗 Deelbaar</span>
            </div>
            {recent.length > 0 && (
              <div className="grid grid-cols-2 gap-2">
                <button onClick={exportData}
                  className="rounded-xl bg-slate-800 border border-slate-700 py-2.5 text-xs font-bold text-slate-500 hover:text-white hover:bg-slate-700 active:scale-95 transition-all">
                  ⬇ Exporteer data

                <label className="rounded-xl bg-slate-800 border border-slate-700 py-2.5 text-xs font-bold text-slate-500 hover:text-white hover:bg-slate-700 active:scale-95 transition-all cursor-pointer text-center">

                  <input type="file" accept=".json" onChange={importData} className="hidden" />

            )}
          </div>
        </div>
      );
    }

    // TEAM AANMAKEN
    // ════════════════════════════════════════════════════════════════
    function CreateTeamView({ onCreated, onBack }) {
      const [name, setName] = useState('');
      const [color, setColor] = useState('orange');
      const [players, setPlayers] = useState([]);
      const [pName, setPName] = useState('');
      const [pNum, setPNum]   = useState('');
      const c = COLORS[color];

      const addPlayer = () => {
        if (!pName.trim()) return;
        setPlayers(p => [...p, { id: db.uid(), name: pName.trim(), number: pNum.trim() }]);
        setPName(''); setPNum('');
      };
      const removePlayer = (id) => setPlayers(p => p.filter(x => x.id !== id));

      const create = () => {
        if (!name.trim() || players.length === 0) return;
        const id = db.uid();
        const team = {
          id, name: name.trim(), color, players, matchIds: [],
          fines: {
            rules: [
              { id: db.uid(), label: 'Te laat',         amount: 2 },
              { id: db.uid(), label: 'Gele kaart',      amount: 5 },
              { id: db.uid(), label: 'Rode kaart',      amount: 10 },
              { id: db.uid(), label: 'Vergeten was',    amount: 5 },
            ],
            entries: [],
          },
          settings: { yellowSuspensionAt: 5 },
          createdAt: Date.now(),
        };
        db.saveTeam(team);
        onCreated(id);
      };

      return (
        <div className="min-h-screen bg-slate-950 pb-14">
          <div className={`relative overflow-hidden bg-gradient-to-br ${c.bg} px-5 pt-12 pb-10`}>
            <button onClick={onBack} className="mb-3 flex items-center gap-1.5 text-sm text-white/80 hover:text-white">
              <ArrowLeft size={14} /> Terug
            </button>
            <h1 className="text-white font-black text-3xl leading-tight">Nieuw team</h1>
            <p className="mt-1 text-sm text-white/80">Geef je team een naam, kleur en voeg spelers toe</p>
          </div>
          <div className="px-4 -mt-5 space-y-4">
            <div className="anim-slide-up rounded-2xl border border-slate-700 bg-slate-800 p-5 shadow-2xl">
              <p className="mb-3 text-xs font-bold uppercase tracking-widest text-slate-500">Team</p>
              <div className="space-y-3">
                <div>
                  <span className="block mb-1.5 text-sm text-slate-400">Teamnaam</span>
                  <div className={`flex items-center gap-3 rounded-xl bg-slate-700/60 px-4 py-3 focus-within:ring-2 focus-within:${c.ring}`}>
                    <Shirt size={15} className={c.text + ' shrink-0'} />
                    <input type="text" placeholder="bv. FC De Vrienden" value={name} onChange={(e) => setName(e.target.value)}
                      className="flex-1 bg-transparent text-white outline-none placeholder-slate-500" />
                  </div>
                </div>
                <div>
                  <span className="block mb-2 text-sm text-slate-400">Teamkleur</span>
                  <div className="flex gap-2">
                    {Object.entries(COLORS).map(([key, col]) => (
                      <button key={key} onClick={() => setColor(key)}
                        className={`h-10 flex-1 rounded-xl ${col.solid} transition-all ${color === key ? 'ring-2 ring-white ring-offset-2 ring-offset-slate-800 scale-110' : 'opacity-70 hover:opacity-100'}`} />
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5 shadow-2xl">
              <div className="mb-3 flex items-center justify-between">
                <p className="text-xs font-bold uppercase tracking-widest text-slate-500">Spelers</p>
                <span className="text-sm text-slate-500">{players.length}</span>
              </div>

              <div className="mb-3 space-y-2">
                {players.map(p => (
                  <div key={p.id} className="flex items-center gap-3 rounded-xl bg-slate-700/50 px-3 py-2.5">
                    <div className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-full ${c.solid} text-white font-black text-sm`}>
                      {p.number || initials(p.name)}
                    </div>
                    <span className="flex-1 text-white font-medium text-sm truncate">{p.name}</span>
                    <button onClick={() => removePlayer(p.id)} className="text-slate-500 hover:text-red-400 p-1"><Trash2 size={14} /></button>
                  </div>
                ))}
                {players.length === 0 && (
                  <p className="py-3 text-center text-sm text-slate-600">Nog geen spelers — voeg er minstens 1 toe</p>
                )}
              </div>

              <div className="grid grid-cols-[1fr_64px_44px] gap-2">
                <input type="text" placeholder="Naam" value={pName} onChange={(e) => setPName(e.target.value)}

                  className={`rounded-xl border border-slate-600 bg-slate-700 px-2 py-2.5 text-sm text-white outline-none placeholder-slate-500 text-center focus:border-${color}-500`} />

              <p className="mt-2 text-xs text-slate-600">Tip: rugnummer is optioneel</p>

        </div>

    // TEAM DASHBOARD

    function TeamDashboard({ teamId, onBack, onCreateMatch, onOpenMatch, refreshKey }) {
      const [team, setTeam] = useState(null);
      const [matches, setMatches] = useState([]);
      const [tab, setTab] = useState('matches');
      const [editRoster, setEditRoster] = useState(false);
      const [modal, setModal] = useState(null);
      const [shareToast, setShareToast] = useState(null);

      useEffect(() => {
        const t = db.getTeam(teamId);
        setTeam(t);
        if (t) setMatches(db.getTeamMatches(t).sort((a, b) => (b.date || '').localeCompare(a.date || '')));
      }, [teamId, refreshKey]);

      if (!team) return (
        <div className="flex min-h-screen flex-col items-center justify-center bg-slate-950 p-8 text-center">
          <div className="mb-4 text-5xl">⚽</div>

          <button onClick={onBack} className="mt-6 rounded-2xl bg-orange-500 px-7 py-3 font-bold text-white">← Terug</button>
        </div>
      );

      const c = COLORS[team.color || 'orange'];
      const stats = useMemo(() => computeStats(team, matches), [team, matches]);
      const upcoming = matches.filter(m => !m.result?.played).sort((a, b) => (a.date || '').localeCompare(b.date || ''));
      const played   = matches.filter(m => m.result?.played).sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      const updateTeam = (updater) => {
        const next = updater(team);
        db.saveTeam(next);
        setTeam(next);
      };

      return (
        <div className="min-h-screen bg-slate-950 pb-14">
          {/* Header */}
          <div className={`relative overflow-hidden bg-gradient-to-br ${c.bg} px-5 pt-12 pb-8`}>
            <div className="absolute -top-12 -right-12 h-52 w-52 rounded-full bg-white/10" />
            <div className="relative flex items-center justify-between mb-4">
              <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-white/80 hover:text-white">
                <ArrowLeft size={14} /> Home
              </button>
              <button onClick={() => { navigator.clipboard.writeText(window.location.href); setShareToast('Link gekopieerd! 🔗'); setTimeout(() => setShareToast(null), 2400); }}
                className="flex items-center gap-1.5 rounded-full bg-white/15 px-3 py-1 text-xs text-white font-semibold hover:bg-white/25 active:scale-95 transition-all">
                <Share2 size={12} /> Deel link
              </button>
            </div>
            <div className="relative">
              <p className="text-sm font-medium text-white/70">⚽ Team</p>
              <h1 className="mt-0.5 text-4xl font-black leading-none text-white">{team.name}</h1>
              {/* Quick stats */}
              <div className="mt-4 grid grid-cols-4 gap-2">
                <div className="rounded-xl bg-white/15 p-2 text-center">
                  <p className="text-xl font-black text-white tabular-nums">{stats.team.played}</p>
                  <p className="text-[10px] uppercase tracking-wider text-white/70 font-bold">gespeeld</p>
                </div>
                <div className="rounded-xl bg-white/15 p-2 text-center">
                  <p className="text-xl font-black text-white tabular-nums">{stats.team.wins}</p>
                  <p className="text-[10px] uppercase tracking-wider text-white/70 font-bold">winst</p>
                </div>
                <div className="rounded-xl bg-white/15 p-2 text-center">
                  <p className="text-xl font-black text-white tabular-nums">{stats.team.draws}</p>
                  <p className="text-[10px] uppercase tracking-wider text-white/70 font-bold">gelijk</p>
                </div>
                <div className="rounded-xl bg-white/15 p-2 text-center">
                  <p className="text-xl font-black text-white tabular-nums">{stats.team.losses}</p>
                  <p className="text-[10px] uppercase tracking-wider text-white/70 font-bold">verlies</p>
                </div>
              </div>
              {/* Laatste 5 vorm */}
              {played.length > 0 && (
                <div className="mt-3 flex items-center gap-2">
                  <span className="text-xs text-white/60 font-semibold">Vorm:</span>
                  <div className="flex gap-1">
                    {played.slice(0, 5).map(m => {
                      const us = m.result.isHome ? m.result.homeScore : m.result.awayScore;
                      const them = m.result.isHome ? m.result.awayScore : m.result.homeScore;
                      const r = us > them ? 'W' : us < them ? 'V' : 'G';
                      return (
                        <span key={m.id} className={`flex h-5 w-5 items-center justify-center rounded text-[10px] font-black leading-none ${
                          r === 'W' ? 'bg-green-500 text-white' : r === 'V' ? 'bg-red-500 text-white' : 'bg-white/30 text-white'
                        }`}>{r}</span>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>

          <div className="px-4 mt-4 space-y-4">
            <Tabs theme={team.color} active={tab} onChange={(t) => { setTab(t); window.scrollTo({ top: 0, behavior: 'smooth' }); }} tabs={[
              { id: 'matches',  label: 'Wedstr.',  icon: <Calendar size={13} /> },
              { id: 'scorers',  label: 'Stats',    icon: <Trophy size={13} /> },
              { id: 'roster',   label: 'Spelers',  icon: <Users size={13} /> },
              { id: 'fines',    label: 'Pot',      icon: <span className="text-[12px]">💰</span> },
            ]} />

            {/* TAB: MATCHES */}
            {tab === 'matches' && (
              <div key="matches" className="tab-fade space-y-3">
                <button onClick={onCreateMatch}
                  className={`w-full rounded-2xl ${c.solid} py-3.5 text-white font-bold flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-lg`}>
                  <Plus size={18} /> Nieuwe wedstrijd
                </button>
                {upcoming.length > 0 && (
                  <>
                    <p className="px-1 text-xs font-bold uppercase tracking-widest text-slate-500">Aankomend ({upcoming.length})</p>
                    {upcoming.map(m => <MatchListItem key={m.id} match={m} theme={team.color} onOpen={() => onOpenMatch(m.id)} />)}
                  </>
                )}
                {played.length > 0 && (
                  <>
                    <p className="px-1 mt-2 text-xs font-bold uppercase tracking-widest text-slate-500">Gespeeld ({played.length})</p>
                    {played.map(m => <MatchListItem key={m.id} match={m} theme={team.color} onOpen={() => onOpenMatch(m.id)} />)}
                  </>
                )}
                {matches.length === 0 && (
                  <div className="rounded-2xl bg-slate-800 border border-slate-700 p-10 text-center">
                    <div className="text-5xl mb-3">📅</div>
                    <p className="text-white font-bold mb-1">Geen wedstrijden</p>
                    <p className="text-slate-500 text-sm">Plan de eerste wedstrijd via de knop hierboven.</p>
                  </div>
                )}
              </div>
            )}

            {/* TAB: SCORERS */}
            {tab === 'scorers' && <div key="scorers" className="tab-fade"><ScorersTab stats={stats} theme={team.color} /></div>}

            {/* TAB: ROSTER */}
            {tab === 'roster' && (
              <div key="roster" className="tab-fade">
                <RosterTab team={team} stats={stats} theme={team.color} edit={editRoster}
                  onToggleEdit={() => setEditRoster(v => !v)}
                  onAddPlayer={(p) => updateTeam(t => ({ ...t, players: [...t.players, { id: db.uid(), ...p }] }))}
                  onRemovePlayer={(id) => updateTeam(t => ({ ...t, players: t.players.filter(x => x.id !== id) }))}
                  onUpdateSettings={(s) => updateTeam(t => ({ ...t, settings: { ...t.settings, ...s } }))}
                />
              </div>
            )}

            {/* TAB: FINES */}
            {tab === 'fines' && (
              <div key="fines" className="tab-fade">
                <FinesTab team={team} theme={team.color} setModal={setModal}
                  persist={(t) => { db.saveTeam(t); setTeam(t); }} />
              </div>
            )}
          </div>
          {modal}
          {shareToast && <Toast key={shareToast} message={shareToast} />}
        </div>
      );
    }

    function MatchListItem({ match, theme, onOpen }) {
      const c = COLORS[theme];
      const r = match.result;
      const played = r?.played;
      const us = played ? (r.isHome ? r.homeScore : r.awayScore) : null;
      const them = played ? (r.isHome ? r.awayScore : r.homeScore) : null;
      const result = played ? (us > them ? 'W' : us < them ? 'V' : 'G') : null;
      const resultClr = result === 'W' ? 'bg-green-500' : result === 'V' ? 'bg-red-500' : result === 'G' ? 'bg-slate-500' : '';
      return (
        <button onClick={onOpen}
          className="w-full flex items-center gap-3 rounded-2xl bg-slate-800 border border-slate-700 hover:border-slate-600 px-4 py-3.5 text-left transition-all active:scale-[0.98]">
          <div className={`flex h-12 w-12 shrink-0 flex-col items-center justify-center rounded-xl ${played ? resultClr : 'bg-slate-700'} text-white`}>
            {played ? (
              <>
                <span className="text-xs font-bold leading-none opacity-90">{result}</span>
                <span className="text-sm font-black leading-tight">{us}-{them}</span>
              </>
            ) : (
              <>
                <span className="text-[10px] font-bold opacity-70">{fmtDateShort(match.date).split(' ')[1]}</span>
                <span className="text-sm font-black leading-tight">{fmtDateShort(match.date).split(' ')[0]}</span>
              </>
            )}
          </div>
          <div className="flex-1 min-w-0">
            <p className="text-white font-bold truncate">vs. {match.opponent}</p>
            <p className="text-xs text-slate-500 truncate">{fmtDate(match.date)} · {match.time}</p>
            {!played && (() => {
              const yesCount = Object.values(match.availability || {}).filter(v => v.status === 'yes').length;
              const driversIn = (match.drivers || []).filter(d => d.name).length;
              if (!yesCount && !driversIn) return null;
              return (
                <div className="flex items-center gap-2 mt-0.5">
                  {yesCount > 0 && <span className="text-[11px] font-bold text-green-400">✓ {yesCount} aanwezig</span>}
                  {driversIn > 0 && <span className="text-[11px] font-semibold text-slate-500">🚗 {driversIn}/{match.driversNeeded}</span>}
                </div>
              );
            })()}
          </div>
          <ChevronRight size={16} className="text-slate-600 shrink-0" />
        </button>
      );
    }

    function ScorersTab({ stats, theme }) {

      const topG = stats.players.filter(s => s.goals > 0).slice(0, 10);
      const topA = [...stats.players].sort((a,b) => b.assists - a.assists).filter(s => s.assists > 0).slice(0, 5);
      const topM = [...stats.players].sort((a,b) => b.motm - a.motm).filter(s => s.motm > 0).slice(0, 3);

      const empty = topG.length === 0 && topA.length === 0;

      return (
        <div className="space-y-4">
          {empty ? (
            <div className="rounded-2xl bg-slate-800 border border-slate-700 p-10 text-center">
              <div className="text-5xl mb-3">🏆</div>
              <p className="text-white font-bold mb-1">Geen statistieken</p>
              <p className="text-slate-500 text-sm">Voer een uitslag in via het Uitslag-tab om doelpunten bij te houden.</p>
            </div>
          ) : (
            <>
              {/* Topscorers */}
              <div className="rounded-2xl bg-slate-800 border border-slate-700 p-5">
                <div className="mb-4 flex items-center gap-2">
                  <div className="flex h-8 w-8 items-center justify-center rounded-xl" style={{ backgroundColor: c.hex + '33' }}>
                    <Goal size={15} className={c.text} />
                  </div>
                  <h2 className="font-bold text-white">Topscorers</h2>
                </div>
                <div className="space-y-1.5">
                  {topG.map((s, i) => (
                    <div key={s.player.id} className="flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-2.5">
                      <div className={`flex h-7 w-7 shrink-0 items-center justify-center rounded-full text-xs font-black ${
                        i === 0 ? 'bg-yellow-500 text-yellow-950' : i === 1 ? 'bg-slate-400 text-slate-900' : i === 2 ? 'bg-orange-700 text-white' : 'bg-slate-700 text-slate-400'
                      }`}>{i + 1}</div>
                      <div className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-full ${c.solid} text-white font-black text-sm`}>
                        {s.player.number || initials(s.player.name)}
                      </div>
                      <div className="flex-1 min-w-0">
                        <p className="text-white font-semibold text-sm truncate">{s.player.name}</p>
                        <p className="text-xs text-slate-500">{s.played} wedstrijd{s.played !== 1 ? 'en' : ''}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-white font-black text-lg leading-none tabular-nums">{s.goals}</p>
                        <p className="text-[10px] uppercase tracking-wider text-slate-500 font-bold">goals</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Topassists */}
              {topA.length > 0 && (
                <div className="rounded-2xl bg-slate-800 border border-slate-700 p-5">
                  <div className="mb-4 flex items-center gap-2">
                    <div className="flex h-8 w-8 items-center justify-center rounded-xl" style={{ backgroundColor: c.hex + '33' }}>
                      <TrendingUp size={15} className={c.text} />
                    </div>
                    <h2 className="font-bold text-white">Top assists</h2>
                  </div>
                  <div className="space-y-1.5">
                    {topA.map((s, i) => (
                      <div key={s.player.id} className="flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-2.5">
                        <div className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-full ${c.solid} text-white font-black text-sm`}>
                          {s.player.number || initials(s.player.name)}
                        </div>
                        <p className="flex-1 text-white font-semibold text-sm truncate">{s.player.name}</p>
                        <div className="text-right">
                          <p className="text-white font-black text-lg leading-none tabular-nums">{s.assists}</p>
                          <p className="text-[10px] uppercase tracking-wider text-slate-500 font-bold">assists</p>
                        </div>
                      </div>
                    ))}

                </div>
              )}

              {/* MOTM */}
              {topM.length > 0 && (
                <div className="rounded-2xl bg-slate-800 border border-slate-700 p-5">
                  <div className="mb-4 flex items-center gap-2">

                    <p className="text-2xl font-black tabular-nums">{stats.team.gf}</p>
                    <p className="text-[10px] uppercase tracking-wider opacity-80 font-bold">voor</p>

                  <div className="text-center">
                    <p className="text-2xl font-black tabular-nums">{stats.team.ga}</p>
                    <p className="text-[10px] uppercase tracking-wider opacity-80 font-bold">tegen</p>
