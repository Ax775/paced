                  <div className="text-center">
                    <p className="text-2xl font-black tabular-nums">{stats.team.points}</p>
                    <p className="text-[10px] uppercase tracking-wider opacity-80 font-bold">punten</p>
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    function RosterTab({ team, stats, theme, edit, onToggleEdit, onAddPlayer, onRemovePlayer, onUpdateSettings }) {
      const c = COLORS[theme];
      const [pName, setPName] = useState('');
      const [pNum, setPNum] = useState('');
      const susThr = team.settings?.yellowSuspensionAt || 5;
      const playerStats = (id) => stats?.players.find(s => s.player.id === id) || { yellow: 0, red: 0, played: 0, goals: 0 };
      const add = () => {
        if (!pName.trim()) return;
        onAddPlayer({ name: pName.trim(), number: pNum.trim() });
        setPName(''); setPNum('');
      };
      return (
        <div className="space-y-3">
          <div className="rounded-2xl bg-slate-800 border border-slate-700 p-5">
            <div className="mb-3 flex items-center justify-between">
              <p className="text-xs font-bold uppercase tracking-widest text-slate-500">Selectie ({team.players.length})</p>
              <button onClick={onToggleEdit} className={`text-xs font-bold ${edit ? c.text : 'text-slate-500'} hover:text-white`}>
                {edit ? 'Klaar' : 'Bewerken'}
              </button>
            </div>
            <div className="space-y-1.5">
              {team.players.map(p => {
                const s = playerStats(p.id);
                const susWarn = s.yellow >= susThr - 1 && s.yellow < susThr;
                const susHit  = s.yellow >= susThr || s.red > 0;
                return (
                  <div key={p.id} className={`flex items-center gap-3 rounded-xl px-3 py-2.5 ${susHit ? 'bg-red-500/10 border border-red-500/30' : susWarn ? 'bg-yellow-500/10 border border-yellow-500/30' : 'bg-slate-700/40'}`}>
                    <div className={`flex h-10 w-10 shrink-0 items-center justify-center rounded-full ${c.solid} text-white font-black`}>
                      {p.number || initials(p.name)}
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-white font-semibold truncate">{p.name}</p>
                      <div className="flex items-center gap-2 mt-0.5 text-xs">
                        <span className="text-slate-500">{s.played} wedstr.</span>
                        {s.goals > 0 && <span className="text-slate-400">⚽ {s.goals}</span>}
                        {s.yellow > 0 && (
                          <span className="flex items-center gap-0.5">
                            <span className="inline-block w-2 h-2.5 rounded-sm bg-yellow-400" />
                            <span className="text-yellow-400 font-bold">{s.yellow}</span>
                          </span>
                        )}
                        {s.red > 0 && (
                          <span className="flex items-center gap-0.5">
                            <span className="inline-block w-2 h-2.5 rounded-sm bg-red-500" />
                            <span className="text-red-400 font-bold">{s.red}</span>
                          </span>
                        )}
                      </div>
                      {susHit && <p className="text-xs text-red-400 font-bold mt-0.5">🚫 GESCHORST</p>}
                      {susWarn && !susHit && <p className="text-xs text-yellow-400 font-bold mt-0.5">⚠️ 1 geel weg van schorsing</p>}
                    </div>
                    {edit && (
                      <button onClick={() => onRemovePlayer(p.id)} className="text-slate-500 hover:text-red-400 p-1.5">
                        <Trash2 size={14} />
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
            {edit && (
              <div className="mt-3 grid grid-cols-[1fr_64px_44px] gap-2">
                <input type="text" placeholder="Nieuwe speler" value={pName} onChange={(e) => setPName(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && add()}
                  className={`rounded-xl border border-slate-600 bg-slate-700 px-3 py-2.5 text-sm text-white outline-none placeholder-slate-500 focus:border-${theme}-500`} />
                <input type="text" inputMode="numeric" placeholder="#" value={pNum} onChange={(e) => setPNum(e.target.value.replace(/\D/g, '').slice(0, 2))}
                  onKeyDown={(e) => e.key === 'Enter' && add()}
                  className={`rounded-xl border border-slate-600 bg-slate-700 px-2 py-2.5 text-sm text-white outline-none text-center focus:border-${theme}-500`} />
                <button onClick={add} className={`flex items-center justify-center rounded-xl ${c.solid} text-white active:scale-95`}>
                  <Plus size={18} />
                </button>
              </div>
            )}
          </div>

          {/* Team-instellingen */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-4 mt-3">
            <div className="flex items-center gap-2 mb-3">
              <Settings size={14} className="text-slate-500" />
              <p className="text-xs font-bold uppercase tracking-widest text-slate-500">Instellingen</p>
            </div>
            <div className="flex items-center gap-3">
              <div className="flex-1">
                <p className="text-sm font-semibold text-white">Schorsingsdrempel</p>
                <p className="text-xs text-slate-500 mt-0.5">Gele kaarten voor schorsing</p>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => onUpdateSettings({ yellowSuspensionAt: Math.max(1, susThr - 1) })}
                  className="h-9 w-9 rounded-xl bg-slate-700 text-white font-bold hover:bg-slate-600 active:scale-95 transition-all text-lg leading-none">−</button>
                <span className="text-white font-black text-xl w-8 text-center tabular-nums">{susThr}</span>
                <button onClick={() => onUpdateSettings({ yellowSuspensionAt: Math.min(10, susThr + 1) })}
                  className="h-9 w-9 rounded-xl bg-slate-700 text-white font-bold hover:bg-slate-600 active:scale-95 transition-all text-lg leading-none">+</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // WEDSTRIJD AANMAKEN
    // ════════════════════════════════════════════════════════════════
    function CreateMatchView({ team, onCreated, onBack }) {
      const c = COLORS[team.color];
      const nextSat = (() => {
        const d = new Date();
        const days = (6 - d.getDay() + 7) % 7 || 7;
        d.setDate(d.getDate() + days);
        return d.toISOString().split('T')[0];
      })();
      const [form, setForm] = useState({ opponent: '', date: nextSat, time: '10:00', location: '', driversNeeded: 2 });
      const [tasks, setTasks] = useState(['Was meenemen', 'Scheidsrechter regelen', 'Snacks & drinken']);
      const [taskInput, setTaskInput] = useState('');

      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
      const isValid = form.opponent.trim() && form.date && form.time && form.location.trim();

      const create = () => {
        if (!isValid) return;
        const id = db.uid();
        const match = {
          id, teamId: team.id,
          opponent: form.opponent.trim(),
          date: form.date, time: form.time, location: form.location.trim(),
          driversNeeded: form.driversNeeded,
          drivers: Array.from({ length: form.driversNeeded }, (_, i) => ({ id: `d${i}_${id}`, name: null })),
          tasks: tasks.map((name, i) => ({ id: `t${i}_${id}`, name, claimedBy: null })),
          lineup: { formation: '4-4-2', positions: {} },
          result: { played: false, isHome: true, homeScore: 0, awayScore: 0, goals: [], cards: [], motmId: null },
          availability: {},
          createdAt: Date.now(),
        };
        db.saveMatch(match);
        const t = { ...team, matchIds: [id, ...(team.matchIds || [])] };
        db.saveTeam(t);
        onCreated(id);
      };

      return (
        <div className="min-h-screen bg-slate-950 pb-14">
          <div className={`relative overflow-hidden bg-gradient-to-br ${c.bg} px-5 pt-12 pb-10`}>
            <button onClick={onBack} className="mb-3 flex items-center gap-1.5 text-sm text-white/80 hover:text-white">
              <ArrowLeft size={14} /> {team.name}
            </button>
            <h1 className="text-white font-black text-3xl leading-tight">Nieuwe wedstrijd</h1>
            <p className="mt-1 text-sm text-white/80">Vul de details in en deel de link met het team</p>
          </div>
          <div className="px-4 -mt-5 space-y-4">
            <div className="anim-slide-up rounded-2xl border border-slate-700 bg-slate-800 p-5 shadow-2xl">
              <p className="mb-3 text-xs font-bold uppercase tracking-widest text-slate-500">Wedstrijd</p>
              <div className="space-y-3">
                <div>
                  <span className="block mb-1.5 text-sm text-slate-400">Tegenstander</span>
                  <div className={`flex items-center gap-3 rounded-xl bg-slate-700/60 px-4 py-3 focus-within:ring-2 focus-within:${c.ring}`}>
                    <Trophy size={15} className={c.text + ' shrink-0'} />
                    <input type="text" placeholder="bv. FC Tegenstand" value={form.opponent} onChange={set('opponent')}
                      className="flex-1 bg-transparent text-white outline-none placeholder-slate-500" />
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <span className="block mb-1.5 text-sm text-slate-400">Datum</span>
                    <div className={`flex items-center gap-2 rounded-xl bg-slate-700/60 px-3 py-3 focus-within:ring-2 focus-within:${c.ring}`}>
                      <Calendar size={14} className={c.text + ' shrink-0'} />
                      <input type="date" value={form.date} onChange={set('date')} className="min-w-0 flex-1 bg-transparent text-sm text-white outline-none" />
                    </div>
                  </div>
                  <div>
                    <span className="block mb-1.5 text-sm text-slate-400">Aanvang</span>
                    <div className={`flex items-center gap-2 rounded-xl bg-slate-700/60 px-3 py-3 focus-within:ring-2 focus-within:${c.ring}`}>
                      <Clock size={14} className={c.text + ' shrink-0'} />
                      <input type="time" value={form.time} onChange={set('time')} className="min-w-0 flex-1 bg-transparent text-sm text-white outline-none" />
                    </div>
                  </div>
                </div>
                <div>
                  <span className="block mb-1.5 text-sm text-slate-400">Locatie</span>
                  <div className={`flex items-center gap-3 rounded-xl bg-slate-700/60 px-4 py-3 focus-within:ring-2 focus-within:${c.ring}`}>
                    <MapPin size={15} className={c.text + ' shrink-0'} />
                    <input type="text" placeholder="bv. Sportpark Noord, veld 2" value={form.location} onChange={set('location')}
                      className="flex-1 bg-transparent text-white outline-none placeholder-slate-500" />
                  </div>
                </div>
                <div>
                  <span className="block mb-2 text-sm text-slate-400">Auto's nodig</span>
                  <div className="flex gap-2">
                    {[1,2,3,4,5].map(n => (
                      <button key={n} onClick={() => setForm(f => ({ ...f, driversNeeded: n }))}
                        className={`flex-1 rounded-full py-1.5 text-sm font-bold transition-all ${form.driversNeeded === n ? `${c.solid} text-white` : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>{n}</button>
                    ))}
                  </div>
                </div>
              </div>
            </div>

            <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5 shadow-2xl">
              <p className="mb-3 text-xs font-bold uppercase tracking-widest text-slate-500">Team-taken</p>
              <div className="mb-3 space-y-2">
                {tasks.map((task, i) => (
                  <div key={i} className="flex items-center gap-3 rounded-xl bg-slate-700/50 px-4 py-2.5">
                    <ClipboardList size={13} className="shrink-0 text-slate-500" />
                    <span className="flex-1 text-sm text-white">{task}</span>
                    <button onClick={() => setTasks(t => t.filter((_, idx) => idx !== i))} className="p-0.5 text-slate-600 hover:text-red-400">
                      <X size={13} />
                    </button>
                  </div>
                ))}
              </div>
              <div className="flex gap-2">
                <input type="text" placeholder="Nieuwe taak…" value={taskInput} onChange={(e) => setTaskInput(e.target.value)}
                  onKeyDown={(e) => e.key === 'Enter' && taskInput.trim() && (setTasks(t => [...t, taskInput.trim()]), setTaskInput(''))}
                  className={`flex-1 rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-sm text-white outline-none placeholder-slate-500 focus:border-${team.color}-500`} />
                <button onClick={() => { if (taskInput.trim()) { setTasks(t => [...t, taskInput.trim()]); setTaskInput(''); } }}
                  className={`flex items-center justify-center rounded-xl ${c.solid} px-4 text-white active:scale-95`}><Plus size={18} /></button>
              </div>
            </div>

            <button onClick={create} disabled={!isValid}
              className={`w-full rounded-2xl py-4 text-lg font-black transition-all ${isValid ? `bg-gradient-to-r ${c.bg} text-white shadow-xl active:scale-95` : 'cursor-not-allowed bg-slate-800 text-slate-600'}`}>
              ⚡ Wedstrijd aanmaken
            </button>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // MATCH VIEW (met tabs: Info, Opstelling, Uitslag)
    // ════════════════════════════════════════════════════════════════
    function MatchView({ matchId, onBack, onTeamUpdated }) {
      const [match, setMatch] = useState(null);
      const [team, setTeam]   = useState(null);
      const [tab, setTab]     = useState('info');
      const [toast, setToast] = useState(null);
      const [modal, setModal] = useState(null);

      const isSharedLink = window.location.hash.includes('?d=');
      useEffect(() => {
        const m = db.getMatch(matchId);
        setMatch(m);
        if (m?.teamId) setTeam(db.getTeam(m.teamId));
      }, [matchId]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2400); };
      const persist = (next) => { db.saveMatch(next); setMatch(next); onTeamUpdated?.(); };

      if (!match) return (
        <div className="flex min-h-screen flex-col items-center justify-center bg-slate-950 p-8 text-center">
          <div className="mb-4 text-5xl">🏟️</div>
          <h2 className="text-xl font-bold text-white">Wedstrijd niet gevonden</h2>
          <button onClick={onBack} className="mt-6 rounded-2xl bg-orange-500 px-7 py-3 font-bold text-white">← Terug</button>
        </div>
      );

      const themeKey = team?.color || 'orange';
      const c = COLORS[themeKey];

      return (
        <div className="min-h-screen bg-slate-950 pb-14">
          {/* Header */}
          <div className="relative overflow-hidden px-5 pt-12 pb-6"
               style={{ background: 'linear-gradient(145deg, #0f172a 0%, #1e3a5f 55%, #0f172a 100%)' }}>
            <div className="pointer-events-none absolute -top-24 -right-24 h-72 w-72 rounded-full opacity-25"
                 style={{ background: `radial-gradient(circle, ${c.hex} 0%, transparent 70%)` }} />
            {isSharedLink && !team && (
              <div className="relative mb-3 rounded-xl bg-blue-500/15 border border-blue-500/30 px-3 py-2 flex items-center gap-2">
                <span className="text-blue-400 text-xs font-bold">🔗 Gedeelde wedstrijdlink</span>
                <span className="text-blue-400/70 text-xs">— je wijzigingen worden lokaal opgeslagen</span>
              </div>
            )}
            <div className="relative flex items-center justify-between mb-4">
              <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-slate-400 hover:text-white">
                <ArrowLeft size={14} /> {team?.name || 'Terug'}
              </button>
              <div className="flex items-center gap-2">
                <button onClick={() => {
                    try {
                      const raw = btoa(encodeURIComponent(JSON.stringify({
                        m: {
                          id: match.id, teamId: match.teamId,
                          opponent: match.opponent, date: match.date, time: match.time,
                          location: match.location, driversNeeded: match.driversNeeded,
                          drivers: match.drivers, tasks: match.tasks,
                          availability: match.availability || {},
                          lineup: match.lineup, result: match.result,
                        },
                        t: team && {
                          id: team.id, name: team.name, color: team.color,
                          players: team.players || [],
                        },
                      })));
                      const payload = raw.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
                      const base = window.location.href.split('#')[0];
                      navigator.clipboard.writeText(`${base}#match-${match.id}?d=${payload}`);
                      showToast('Teamlink gekopieerd! Stuur naar teamleden 🔗');
                    } catch { navigator.clipboard.writeText(window.location.href); showToast('Link gekopieerd! 🔗'); }
                  }}
                  className={`flex items-center gap-1.5 rounded-full border ${c.border} bg-white/5 px-3 py-1 text-xs font-bold ${c.text} active:scale-95 transition-all`}>
                  <Share2 size={12} /> Deel
                </button>
                <button aria-label="Wedstrijd bewerken"
                  onClick={() => setModal(<EditMatchModal match={match} theme={themeKey}
                    onSave={(f) => { persist({ ...match, ...f }); setModal(null); showToast('Opgeslagen ✓'); }}
                    onCancel={() => setModal(null)} />)}
                  className={`flex h-7 w-7 items-center justify-center rounded-full bg-white/10 border border-white/20 ${c.text} hover:bg-white/20 active:scale-95 transition-all`}>
                  <Pencil size={12} />
                </button>
                <button aria-label="Wedstrijd verwijderen"
                  onClick={() => { if (window.confirm('Wedstrijd verwijderen?')) { db.deleteMatch(matchId, match.teamId); onTeamUpdated?.(); onBack(); } }}
                  className="flex h-7 w-7 items-center justify-center rounded-full bg-red-500/15 border border-red-500/30 text-red-400 hover:bg-red-500/25 active:scale-95 transition-all">
                  <Trash2 size={12} />
                </button>
              </div>
            </div>
            <div className="relative">
              <p className="text-sm font-medium text-slate-500">vs.</p>
              <h1 className="mt-0.5 text-3xl font-black leading-tight text-white">{match.opponent}</h1>
              <div className="mt-3 flex flex-wrap gap-2">
                <Pill icon={<Calendar size={11} />} iconClass={c.text}>{fmtDate(match.date)}</Pill>
                <Pill icon={<Clock size={11} />} iconClass={c.text}>{match.time}</Pill>
                <Pill icon={<MapPin size={11} />} iconClass={c.text}>{match.location}</Pill>
              </div>
              {match.result?.played && (
                <div className={`mt-4 inline-flex items-center gap-2 rounded-2xl ${
                  match.result.isHome
                    ? (match.result.homeScore > match.result.awayScore ? 'bg-green-500/20 border-green-500/40' : match.result.homeScore < match.result.awayScore ? 'bg-red-500/20 border-red-500/40' : 'bg-slate-700/50 border-slate-600')
                    : (match.result.awayScore > match.result.homeScore ? 'bg-green-500/20 border-green-500/40' : match.result.awayScore < match.result.homeScore ? 'bg-red-500/20 border-red-500/40' : 'bg-slate-700/50 border-slate-600')
                } border px-4 py-2 text-white font-black text-2xl tabular-nums`}>
                  {match.result.homeScore} <span className="text-slate-400 text-base">-</span> {match.result.awayScore}
                </div>
              )}
            </div>
          </div>

          <div className="px-4 mt-4 space-y-4">
            <Tabs theme={themeKey} active={tab} onChange={(t) => { setTab(t); window.scrollTo({ top: 0, behavior: 'smooth' }); }} tabs={[
              { id: 'info',    label: 'Info',       icon: <Car size={13} /> },
              { id: 'lineup',  label: 'Opstelling', icon: <Shirt size={13} /> },
              { id: 'result',  label: 'Uitslag',    icon: <Goal size={13} /> },
            ]} />

            {tab === 'info'   && <div key="info"   className="tab-fade"><InfoTab   match={match} team={team} theme={themeKey} persist={persist} setModal={setModal} showToast={showToast} /></div>}
            {tab === 'lineup' && <div key="lineup" className="tab-fade"><LineupTab match={match} team={team} theme={themeKey} persist={persist} setModal={setModal} /></div>}
            {tab === 'result' && <div key="result" className="tab-fade"><ResultTab match={match} team={team} theme={themeKey} persist={persist} setModal={setModal} /></div>}
          </div>

          {modal}
          {toast && <Toast key={toast} message={toast} />}
        </div>
      );
    }

    function Pill({ icon, children, iconClass = 'text-slate-400' }) {
      return (
        <div className="flex max-w-[220px] items-center gap-1.5 rounded-full bg-white/10 px-3 py-1.5">
          <span className={`shrink-0 ${iconClass}`}>{icon}</span>
          <span className="truncate text-xs font-semibold text-white">{children}</span>
        </div>
      );
    }

    // ── AVAILABILITY (per wedstrijd) ─────────────────────
    function AvailabilitySection({ match, team, theme, persist }) {
      const c = COLORS[theme];
      if (!team || !team.players?.length) return null;

      const av = match.availability || {};
      const counts = team.players.reduce((acc, p) => {
        const s = av[p.id]?.status;
        if (s === 'yes') acc.yes++;
        else if (s === 'maybe') acc.maybe++;
        else if (s === 'no') acc.no++;
        else acc.unknown++;
        return acc;
      }, { yes: 0, maybe: 0, no: 0, unknown: 0 });

      const setStatus = (playerId, status) => {
        const next = { ...av };
        if (next[playerId]?.status === status) {
          delete next[playerId]; // toggle off
        } else {
          next[playerId] = { status, updatedAt: Date.now() };
        }
        persist({ ...match, availability: next });
      };

      return (
        <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
          <div className="mb-3 flex items-center gap-2">
            <div className="flex h-8 w-8 items-center justify-center rounded-xl" style={{ backgroundColor: c.hex + '33' }}>
              <Users size={15} className={c.text} />
            </div>
            <h2 className="font-bold text-white">Wie komt?</h2>
            <span className="ml-auto text-sm text-slate-500 tabular-nums">
              {counts.yes + counts.maybe}/{team.players.length}
            </span>
          </div>

          {/* Compact summary pills */}
          <div className="mb-3 grid grid-cols-4 gap-2 text-center">
            <div className="rounded-lg bg-green-500/15 border border-green-500/30 py-1.5">
              <p className="text-green-400 font-black text-lg leading-none">{counts.yes}</p>
              <p className="text-[10px] text-green-400/80 font-bold uppercase">komt</p>
            </div>
            <div className="rounded-lg bg-yellow-500/15 border border-yellow-500/30 py-1.5">
              <p className="text-yellow-400 font-black text-lg leading-none">{counts.maybe}</p>
              <p className="text-[10px] text-yellow-400/80 font-bold uppercase">twijfel</p>
            </div>
            <div className="rounded-lg bg-red-500/15 border border-red-500/30 py-1.5">
              <p className="text-red-400 font-black text-lg leading-none">{counts.no}</p>
              <p className="text-[10px] text-red-400/80 font-bold uppercase">niet</p>
            </div>
            <div className="rounded-lg bg-slate-700 border border-slate-600 py-1.5">
              <p className="text-slate-400 font-black text-lg leading-none">{counts.unknown}</p>
              <p className="text-[10px] text-slate-500 font-bold uppercase">?</p>
            </div>
          </div>

          {/* Player rows with status buttons */}
          <div className="space-y-1.5">
            {team.players.map(p => {
              const status = av[p.id]?.status;
              return (
                <div key={p.id} className="flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-2">
                  <div className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-full ${c.solid} text-white font-black text-sm`}>
                    {p.number || initials(p.name)}
                  </div>
                  <span className="flex-1 text-white font-semibold text-sm truncate">{p.name}</span>
                  <div className="flex gap-1">
                    <StatusPill icon="✅" active={status === 'yes'}   onClick={() => setStatus(p.id, 'yes')}   activeClr="bg-green-500"  ariaLabel="Ik kom" />
                    <StatusPill icon="🤔" active={status === 'maybe'} onClick={() => setStatus(p.id, 'maybe')} activeClr="bg-yellow-500" ariaLabel="Misschien" />
                    <StatusPill icon="❌" active={status === 'no'}    onClick={() => setStatus(p.id, 'no')}    activeClr="bg-red-500"    ariaLabel="Ik kom niet" />
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function StatusPill({ icon, active, onClick, activeClr, ariaLabel }) {
      return (
        <button onClick={onClick} aria-label={ariaLabel} aria-pressed={active}
          className={`h-9 w-9 rounded-lg text-sm transition-all flex items-center justify-center ${active ? `${activeClr} scale-110 shadow-lg` : 'bg-slate-700 hover:bg-slate-600 grayscale opacity-50'}`}>
          {icon}
        </button>
      );
    }

    // ── INFO TAB (availability + carpool + tasks) ─────────────────────
    function InfoTab({ match, team, theme, persist, setModal, showToast }) {
      const c = COLORS[theme];
      const filled = match.drivers.filter(d => d.name).length;
      const claimed = match.tasks.filter(t => t.claimedBy).length;

      const claimDriver = (driverId) => {
        setModal(<NameModal title={`Inschrijven als chauffeur`} subtitle="Vul je naam in" cta="🚗 Ik rijd!" theme={theme}
          onConfirm={(name) => {
            persist({ ...match, drivers: match.drivers.map(d => d.id === driverId ? { ...d, name } : d) });
            setModal(null); showToast(`${name} rijdt mee! 🚗`);
          }}
          onCancel={() => setModal(null)} />);
      };
      const releaseDriver = (id) => persist({ ...match, drivers: match.drivers.map(d => d.id === id ? { ...d, name: null } : d) });

      const claimTask = (taskId, taskName) => {
        setModal(<NameModal title={`Claim: "${taskName}"`} subtitle="Vul je naam in" cta="✅ Ik regel het!" theme={theme}
          onConfirm={(name) => {
            persist({ ...match, tasks: match.tasks.map(t => t.id === taskId ? { ...t, claimedBy: name } : t) });
            setModal(null); showToast(`${name} regelt het! ✅`);
          }}
          onCancel={() => setModal(null)} />);
      };
      const releaseTask = (id) => persist({ ...match, tasks: match.tasks.map(t => t.id === id ? { ...t, claimedBy: null } : t) });

      return (
        <div className="space-y-4">
          {/* Uitslag-banner als gespeeld */}
          {match.result?.played && (() => {
            const r = match.result;
            const us = r.isHome ? r.homeScore : r.awayScore;
            const them = r.isHome ? r.awayScore : r.homeScore;
            const outcome = us > them ? 'win' : us < them ? 'loss' : 'draw';
            const motm = team?.players.find(p => p.id === r.motmId);
            const scorers = (r.goals || []).reduce((acc, g) => {
              const n = team?.players.find(p => p.id === g.scorerId)?.name?.split(' ')[0];
              if (n) { acc[n] = (acc[n] || 0) + 1; }
              return acc;
            }, {});
            return (
              <div className={`rounded-2xl p-4 border ${
                outcome === 'win'  ? 'bg-green-500/10 border-green-500/30' :
                outcome === 'loss' ? 'bg-red-500/10 border-red-500/30' :
                'bg-slate-700/40 border-slate-600'}`}>
                <p className="text-xs font-bold uppercase tracking-widest text-slate-500 mb-2">Eindstand · {r.isHome ? 'Thuis' : 'Uit'}</p>
                <div className="flex items-center justify-between">
                  <div>
                    <p className="text-4xl font-black text-white tabular-nums leading-none">{us} – {them}</p>
                    <p className={`text-sm font-bold mt-1.5 ${outcome === 'win' ? 'text-green-400' : outcome === 'loss' ? 'text-red-400' : 'text-slate-400'}`}>
                      {outcome === 'win' ? '🏆 Gewonnen' : outcome === 'loss' ? '😤 Verloren' : '🤝 Gelijkspel'}
                    </p>
                  </div>
                  {motm && (
                    <div className="text-right">
                      <p className="text-[10px] font-bold uppercase tracking-wider text-yellow-400/80">MOTM</p>
                      <p className="text-sm font-bold text-yellow-300 mt-0.5">⭐ {motm.name.split(' ')[0]}</p>
                    </div>
                  )}
                </div>
                {Object.keys(scorers).length > 0 && (
                  <div className="mt-3 flex flex-wrap gap-1.5">
                    {Object.entries(scorers).map(([name, n]) => (
                      <span key={name} className="rounded-full bg-white/10 px-2.5 py-1 text-xs font-semibold text-white">
                        ⚽ {name}{n > 1 ? ` ×${n}` : ''}
                      </span>
                    ))}
                  </div>
                )}
              </div>
            );
          })()}

          {/* Beschikbaarheid */}
          <AvailabilitySection match={match} team={team} theme={theme} persist={persist} />

          {/* Carpool */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
            <div className="mb-4 flex items-center gap-2">
              <div className="flex h-8 w-8 items-center justify-center rounded-xl" style={{ backgroundColor: c.hex + '33' }}>
                <Car size={15} className={c.text} />
              </div>
              <h2 className="font-bold text-white">Carpool</h2>
            </div>
            <ProgressBar theme={theme} current={filled} total={match.driversNeeded} label="Auto's geregeld" />
            <div className="mt-4 space-y-2.5">
              {match.drivers.map((driver, i) => {
                const claimed = !!driver.name;
                return (
                  <div key={driver.id}
                    onClick={() => !claimed && claimDriver(driver.id)}
                    className={`flex items-center gap-3 rounded-2xl border px-4 py-3.5 transition-all ${claimed ? 'card-claimed border-green-500/30' : 'cursor-pointer border-dashed border-slate-600 bg-slate-700/40 hover:border-slate-500 active:scale-95'}`}>
                    <div className={`flex h-10 w-10 shrink-0 items-center justify-center rounded-xl text-sm font-black ${claimed ? 'bg-green-500 text-white' : 'bg-slate-700 text-slate-500'}`}>
                      {claimed ? (driver.name?.[0]?.toUpperCase() ?? '?') : i + 1}
                    </div>
                    <div className="min-w-0 flex-1">
                      {claimed
                        ? (<><p className="font-bold text-white">{driver.name}</p><p className="text-xs text-green-400">Rijdt ✓</p></>)
                        : <p className="text-sm text-slate-500">Chauffeur {i + 1} — <span className="text-slate-400">tap om te rijden</span></p>}
                    </div>
                    {claimed
                      ? <button onClick={(e) => { e.stopPropagation(); releaseDriver(driver.id); }} className="rounded-lg p-1.5 text-slate-600 hover:text-red-400"><X size={14} /></button>
                      : <Car size={15} className="shrink-0 text-slate-700" />}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Tasks */}
          {match.tasks.length > 0 && (
            <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
              <div className="mb-4 flex items-center gap-2">
                <div className="flex h-8 w-8 items-center justify-center rounded-xl" style={{ backgroundColor: c.hex + '33' }}>
                  <ClipboardList size={15} className={c.text} />
                </div>
                <h2 className="font-bold text-white">Team-taken</h2>
                <span className="ml-auto text-sm text-slate-500 tabular-nums">{claimed}/{match.tasks.length}</span>
              </div>
              <ProgressBar theme={theme} current={claimed} total={match.tasks.length} label="Geregeld" />
              <div className="mt-4 space-y-2.5">
                {match.tasks.map(task => {
                  const isClaimed = !!task.claimedBy;
                  return (
                    <div key={task.id}
                      onClick={() => !isClaimed && claimTask(task.id, task.name)}
                      className={`flex items-center gap-3 rounded-2xl border px-4 py-3.5 transition-all ${isClaimed ? 'card-claimed border-green-500/30' : 'cursor-pointer border-dashed border-slate-600 bg-slate-700/40 hover:border-slate-500 active:scale-95'}`}>
                      <div className={`flex h-6 w-6 shrink-0 items-center justify-center rounded-lg border-2 ${isClaimed ? 'border-green-500 bg-green-500' : 'border-slate-600'}`}>
                        {isClaimed && <CheckCircle size={13} className="text-white" />}
                      </div>
                      <div className="min-w-0 flex-1">
                        <p className={`text-sm font-semibold ${isClaimed ? 'text-slate-500 line-through' : 'text-white'}`}>{task.name}</p>
                        {isClaimed && <p className="mt-0.5 text-xs text-green-400">door {task.claimedBy}</p>}
                      </div>
                      {isClaimed
                        ? <button onClick={(e) => { e.stopPropagation(); releaseTask(task.id); }} className="rounded-lg p-1.5 text-slate-600 hover:text-red-400"><X size={14} /></button>
                        : <ChevronRight size={15} className="shrink-0 text-slate-600" />}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── LINEUP TAB ─────────────────────
    function LineupTab({ match, team, theme, persist, setModal }) {
      const c = COLORS[theme];
      if (!team) return (
        <div className="rounded-2xl bg-slate-800 border border-slate-700 p-8 text-center">
          <p className="text-slate-400 text-sm">Geen team gekoppeld aan deze wedstrijd</p>
        </div>
      );
      const lineup = match.lineup || { formation: '4-4-2', positions: {} };
      const usedIds = Object.values(lineup.positions || {}).filter(Boolean);

      const setFormation = (key) => persist({ ...match, lineup: { ...lineup, formation: key } });
      const setPosition = (posId, playerId) => {
        const newPositions = { ...lineup.positions };
        // Verwijder speler van eventuele andere positie
        Object.keys(newPositions).forEach(k => { if (newPositions[k] === playerId) delete newPositions[k]; });
        if (playerId === null) delete newPositions[posId]; else newPositions[posId] = playerId;
        persist({ ...match, lineup: { ...lineup, positions: newPositions } });
      };

      const tapPosition = (pos) => {
        const currentId = lineup.positions?.[pos.id];
        setModal(<PlayerPicker
          title={`Speler voor ${pos.label}`}
          players={team.players}
          selected={currentId}
          allowNone={!!currentId}
          theme={theme}
          onPick={(id) => { setPosition(pos.id, id); setModal(null); }}
          onCancel={() => setModal(null)}
        />);
      };

      const bench = team.players.filter(p => !usedIds.includes(p.id));

      return (
        <div className="space-y-4">
          {/* Formatie kiezer */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-4">
            <p className="mb-2 text-xs font-bold uppercase tracking-widest text-slate-500">Formatie</p>
            <div className="grid grid-cols-4 gap-2">
              {Object.keys(FORMATIONS).map(key => (
                <button key={key} onClick={() => setFormation(key)}
                  className={`rounded-xl py-2 text-sm font-black transition-all ${lineup.formation === key ? `${c.solid} text-white shadow-lg` : 'bg-slate-700 text-slate-400 hover:bg-slate-600'}`}>
                  {key}
                </button>
              ))}
            </div>
          </div>

          {/* Veld */}
          <Pitch formation={lineup.formation} positions={lineup.positions} players={team.players} theme={theme} onPositionTap={tapPosition} />

          {/* Bank */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-4">
            <p className="mb-2 text-xs font-bold uppercase tracking-widest text-slate-500">Bank ({bench.length})</p>
            {bench.length === 0 ? (
              <p className="py-2 text-center text-sm text-slate-600">Iedereen staat opgesteld 🔥</p>
            ) : (
              <div className="flex flex-wrap gap-2">
                {bench.map(p => (
                  <div key={p.id} className="flex items-center gap-2 rounded-full bg-slate-700/50 pl-1 pr-3 py-1">
                    <div className={`flex h-7 w-7 items-center justify-center rounded-full ${c.solid} text-white text-xs font-black`}>
                      {p.number || initials(p.name)}
                    </div>
                    <span className="text-sm text-white">{p.name}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <p className="text-center text-xs text-slate-600">Tik op een positie om een speler te kiezen</p>
        </div>
      );
    }

    // ── RESULT TAB ─────────────────────
    function ResultTab({ match, team, theme, persist, setModal }) {
      const c = COLORS[theme];
      const r = match.result || { played: false, isHome: true, homeScore: 0, awayScore: 0, goals: [], cards: [], motmId: null };

      const update = (changes) => persist({ ...match, result: { ...r, ...changes } });
      const setScore = (key, val) => {
        const n = Math.max(0, Math.min(99, parseInt(val) || 0));
        update({ [key]: n, played: true });
      };
      const adjustScore = (key, delta) => {
        const n = Math.max(0, Math.min(99, (r[key] || 0) + delta));
        update({ [key]: n, played: true });
      };
      const addGoal = () => {
        if (!team) return;
        setModal(<GoalEntryModal team={team} theme={theme} usCount={r.isHome ? r.homeScore : r.awayScore}
          onSave={(goal) => {
            const newGoals = [...(r.goals || []), { id: db.uid(), ...goal }];
            const ourScore = newGoals.length;
            const usKey = r.isHome ? 'homeScore' : 'awayScore';
            update({ goals: newGoals, [usKey]: Math.max(r[usKey] || 0, ourScore), played: true });
            setModal(null);
          }}
          onCancel={() => setModal(null)} />);
      };
      const removeGoal = (id) => update({ goals: r.goals.filter(g => g.id !== id) });

      const addCard = () => {
        if (!team) return;
        setModal(<CardEntryModal team={team} theme={theme}
          onSave={(card) => { update({ cards: [...(r.cards || []), { id: db.uid(), ...card }] }); setModal(null); }}
          onCancel={() => setModal(null)} />);
      };
      const removeCard = (id) => update({ cards: r.cards.filter(x => x.id !== id) });

      const setMotm = () => {
        if (!team) return;
        setModal(<PlayerPicker title="Man of the Match" players={team.players} selected={r.motmId} allowNone={!!r.motmId} theme={theme}
          onPick={(id) => { update({ motmId: id, played: true }); setModal(null); }}
          onCancel={() => setModal(null)} />);
      };

      const motm = team?.players.find(p => p.id === r.motmId);

      return (
        <div className="space-y-4">
          {/* Thuis / uit */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-4">
            <div className="flex gap-2">
              <button onClick={() => update({ isHome: true })}
                className={`flex-1 rounded-xl py-2 text-sm font-bold transition-all ${r.isHome ? `${c.solid} text-white` : 'bg-slate-700 text-slate-400'}`}>🏠 Thuis</button>
              <button onClick={() => update({ isHome: false })}
                className={`flex-1 rounded-xl py-2 text-sm font-bold transition-all ${!r.isHome ? `${c.solid} text-white` : 'bg-slate-700 text-slate-400'}`}>✈️ Uit</button>
            </div>
          </div>

          {/* Scorebord */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
            <p className="mb-4 text-xs font-bold uppercase tracking-widest text-slate-500">Eindstand</p>
            <div className="grid grid-cols-[1fr_auto_1fr] items-center gap-4">
              <div className="text-center">
                <p className="text-xs font-bold text-slate-500 mb-2">{r.isHome ? team?.name || 'Wij' : match.opponent}</p>
                <div className="flex items-center justify-center gap-2">
                  <button onClick={() => adjustScore('homeScore', -1)} className="h-8 w-8 rounded-lg bg-slate-700 text-white font-bold hover:bg-slate-600">−</button>
                  <input type="number" min="0" max="99" inputMode="numeric" value={r.homeScore} onChange={(e) => setScore('homeScore', e.target.value)}
                    className={`w-14 text-center text-3xl font-black bg-transparent text-white outline-none border-b-2 ${c.border} tabular-nums`} />
                  <button onClick={() => adjustScore('homeScore', 1)} className="h-8 w-8 rounded-lg bg-slate-700 text-white font-bold hover:bg-slate-600">+</button>
                </div>
              </div>
              <div className="text-3xl font-black text-slate-600">−</div>
              <div className="text-center">
                <p className="text-xs font-bold text-slate-500 mb-2">{!r.isHome ? team?.name || 'Wij' : match.opponent}</p>
                <div className="flex items-center justify-center gap-2">
                  <button onClick={() => adjustScore('awayScore', -1)} className="h-8 w-8 rounded-lg bg-slate-700 text-white font-bold hover:bg-slate-600">−</button>
                  <input type="number" min="0" max="99" inputMode="numeric" value={r.awayScore} onChange={(e) => setScore('awayScore', e.target.value)}
                    className={`w-14 text-center text-3xl font-black bg-transparent text-white outline-none border-b-2 ${c.border} tabular-nums`} />
                  <button onClick={() => adjustScore('awayScore', 1)} className="h-8 w-8 rounded-lg bg-slate-700 text-white font-bold hover:bg-slate-600">+</button>
                </div>
              </div>
            </div>
          </div>

          {/* Doelpunten */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
            <div className="mb-3 flex items-center gap-2">
              <Goal size={15} className={c.text} />
              <h3 className="font-bold text-white">Doelpunten ({r.goals?.length || 0})</h3>
            </div>
            <div className="space-y-1.5 mb-3">
              {(r.goals || []).map(g => {
                const sc = team?.players.find(p => p.id === g.scorerId);
                const as = g.assistId && team?.players.find(p => p.id === g.assistId);
                return (
                  <div key={g.id} className="flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-2.5">
                    <span className="text-xs font-bold text-slate-500 tabular-nums w-7">{g.minute ? g.minute + "'" : ''}</span>
                    <Goal size={14} className={c.text + ' shrink-0'} />
                    <div className="flex-1 min-w-0">
                      <p className="text-white font-semibold text-sm truncate">{sc?.name || '—'}</p>
                      {as && <p className="text-xs text-slate-500 truncate">assist: {as.name}</p>}
                    </div>
                    <button onClick={() => removeGoal(g.id)} className="text-slate-600 hover:text-red-400 p-1"><X size={13} /></button>
                  </div>
                );
              })}
              {(r.goals || []).length === 0 && <p className="py-2 text-center text-sm text-slate-600">Nog geen doelpunten</p>}
            </div>
            <button onClick={addGoal} disabled={!team}
              className={`w-full rounded-xl ${c.solid} py-2.5 text-white font-bold text-sm hover:opacity-90 active:scale-95 disabled:opacity-40 transition-all flex items-center justify-center gap-1.5`}>
              <Plus size={15} /> Doelpunt toevoegen
            </button>
          </div>

          {/* Kaarten */}
          <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
            <div className="mb-3 flex items-center gap-2">
              <div className="flex gap-0.5">
                <div className="w-3 h-4 rounded-sm bg-yellow-400" />
                <div className="w-3 h-4 rounded-sm bg-red-500" />
              </div>
              <h3 className="font-bold text-white">Kaarten ({r.cards?.length || 0})</h3>
            </div>
            <div className="space-y-1.5 mb-3">
              {(r.cards || []).map(card => {
                const player = team?.players.find(p => p.id === card.playerId);
                return (
                  <div key={card.id} className="flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-2.5">
                    <span className="text-xs font-bold text-slate-500 tabular-nums w-7">{card.minute ? card.minute + "'" : ''}</span>
                    <div className={`w-3 h-4 rounded-sm shrink-0 ${card.type === 'red' ? 'bg-red-500' : 'bg-yellow-400'}`} />
                    <p className="flex-1 text-white font-semibold text-sm truncate">{player?.name || '—'}</p>
                    <button onClick={() => removeCard(card.id)} className="text-slate-600 hover:text-red-400 p-1"><X size={13} /></button>
                  </div>
                );
              })}
              {(r.cards || []).length === 0 && <p className="py-2 text-center text-sm text-slate-600">Geen kaarten</p>}
            </div>
            <button onClick={addCard} disabled={!team}
              className="w-full rounded-xl bg-slate-700 hover:bg-slate-600 py-2.5 text-white font-bold text-sm disabled:opacity-40 active:scale-95 transition-all flex items-center justify-center gap-1.5">
              <Plus size={15} /> Kaart toevoegen
            </button>
          </div>

          {/* MOTM */}
          <button onClick={setMotm} disabled={!team}
            className="w-full rounded-2xl border border-slate-700 bg-slate-800 p-4 text-left hover:bg-slate-700/50 active:scale-[0.98] transition-all disabled:opacity-50">
            <div className="flex items-center gap-3">
              <div className="flex h-10 w-10 items-center justify-center rounded-xl bg-yellow-500/20">
                <Crown size={18} className="text-yellow-400" />
              </div>
              <div className="flex-1">
                <p className="text-xs font-bold uppercase tracking-widest text-slate-500">Man of the Match</p>
                {motm
                  ? <p className="text-white font-bold mt-0.5">{motm.name}</p>
                  : <p className="text-slate-500 text-sm mt-0.5">Nog niet gekozen — tap om te kiezen</p>}
              </div>
              <ChevronRight size={16} className="text-slate-600" />
            </div>
          </button>
        </div>
      );
    }

    // ── DOELPUNT-INVOER MODAL ─────────────────────
    function GoalEntryModal({ team, theme, onSave, onCancel }) {
      const c = COLORS[theme];
      const [scorerId, setScorerId] = useState(null);
      const [assistId, setAssistId] = useState(null);
      const [minute, setMinute]     = useState('');
      const [picking, setPicking]   = useState(null);

      const scorer = team.players.find(p => p.id === scorerId);
      const assist = team.players.find(p => p.id === assistId);

      if (picking === 'scorer') return (
        <PlayerPicker title="Wie scoorde?" players={team.players} selected={scorerId} theme={theme}
          onPick={(id) => { setScorerId(id); setPicking(null); }} onCancel={() => setPicking(null)} />
      );
      if (picking === 'assist') return (
        <PlayerPicker title="Wie gaf de assist?" players={team.players} selected={assistId} exclude={[scorerId]} allowNone={true} theme={theme}
          onPick={(id) => { setAssistId(id); setPicking(null); }} onCancel={() => setPicking(null)} />
      );

      return (
        <Modal onClose={onCancel}>
          <h3 className="text-white font-bold text-lg mb-1">Doelpunt toevoegen</h3>
          <p className="text-slate-400 text-sm mb-4">Wie scoorde, met assist en minuut</p>

          <button onClick={() => setPicking('scorer')}
            className={`w-full mb-2 flex items-center gap-3 rounded-xl border-2 ${scorer ? c.border : 'border-dashed border-slate-600 bg-slate-700/40'} px-4 py-3 text-left`}
            style={scorer ? { backgroundColor: c.hex + '1a' } : {}}>
            <Goal size={16} className={scorer ? c.text : 'text-slate-500'} />
            <div className="flex-1">
              <p className="text-xs font-bold uppercase text-slate-500">Schutter *</p>
              <p className={`font-bold ${scorer ? 'text-white' : 'text-slate-500'}`}>{scorer?.name || 'Tap om te kiezen'}</p>
            </div>
          </button>

          <button onClick={() => setPicking('assist')} disabled={!scorerId}
            className="w-full mb-2 flex items-center gap-3 rounded-xl border-2 border-dashed border-slate-600 bg-slate-700/40 px-4 py-3 text-left disabled:opacity-50">
            <TrendingUp size={16} className={assist ? 'text-blue-400' : 'text-slate-500'} />
            <div className="flex-1">
              <p className="text-xs font-bold uppercase text-slate-500">Assist (optioneel)</p>
              <p className={`font-bold ${assist ? 'text-white' : 'text-slate-500'}`}>{assist?.name || 'Tap om te kiezen'}</p>
            </div>
          </button>

          <div className="mt-3">
            <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Minuut (optioneel)</p>
            <input type="number" inputMode="numeric" placeholder="bv. 23" value={minute} onChange={(e) => setMinute(String(Math.min(120, parseInt(e.target.value.replace(/\D/g, '') || '0'))))}
              className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-white outline-none focus:border-${theme}-500`} />
          </div>

          <div className="mt-5 flex gap-3">
            <button onClick={onCancel} className="flex-1 rounded-2xl bg-slate-700 py-3.5 text-slate-300 font-semibold hover:bg-slate-600">Annuleer</button>
            <button onClick={() => onSave({ scorerId, assistId, minute: minute ? parseInt(minute) : null })} disabled={!scorerId}
              className={`flex-1 rounded-2xl ${c.solid} py-3.5 text-white font-bold disabled:opacity-40 active:scale-95`}>⚽ Opslaan</button>
          </div>
        </Modal>
      );
    }

    // ── KAART-INVOER MODAL ─────────────────────
    function CardEntryModal({ team, theme, onSave, onCancel }) {
      const c = COLORS[theme];
      const [playerId, setPlayerId] = useState(null);
      const [type, setType] = useState('yellow');
      const [minute, setMinute] = useState('');
      const [picking, setPicking] = useState(false);
      const player = team.players.find(p => p.id === playerId);

      if (picking) return (
        <PlayerPicker title="Welke speler?" players={team.players} selected={playerId} theme={theme}
          onPick={(id) => { setPlayerId(id); setPicking(false); }} onCancel={() => setPicking(false)} />
      );

      return (
        <Modal onClose={onCancel}>
          <h3 className="text-white font-bold text-lg mb-4">Kaart toevoegen</h3>

          <button onClick={() => setPicking(true)}
            className="w-full mb-3 flex items-center gap-3 rounded-xl border-2 border-dashed border-slate-600 bg-slate-700/40 px-4 py-3 text-left">
            <Users size={16} className={player ? c.text : 'text-slate-500'} />
            <div className="flex-1">
              <p className="text-xs font-bold uppercase text-slate-500">Speler</p>
              <p className={`font-bold ${player ? 'text-white' : 'text-slate-500'}`}>{player?.name || 'Tap om te kiezen'}</p>
            </div>
          </button>

          <p className="text-xs font-bold uppercase text-slate-500 mb-2">Soort</p>
          <div className="flex gap-2 mb-3">
            <button onClick={() => setType('yellow')}
              className={`flex-1 flex items-center justify-center gap-2 rounded-xl py-3 font-bold transition-all ${type === 'yellow' ? 'bg-yellow-500 text-yellow-950' : 'bg-slate-700 text-slate-400'}`}>
              <div className="w-3 h-4 rounded-sm bg-yellow-400" /> Geel
            </button>
            <button onClick={() => setType('red')}
              className={`flex-1 flex items-center justify-center gap-2 rounded-xl py-3 font-bold transition-all ${type === 'red' ? 'bg-red-500 text-white' : 'bg-slate-700 text-slate-400'}`}>
              <div className="w-3 h-4 rounded-sm bg-red-500" /> Rood
            </button>
          </div>

          <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Minuut (optioneel)</p>
          <input type="number" inputMode="numeric" placeholder="bv. 67" value={minute} onChange={(e) => setMinute(String(Math.min(120, parseInt(e.target.value.replace(/\D/g, '') || '0'))))}
            className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-white outline-none focus:border-${theme}-500`} />

          <div className="mt-5 flex gap-3">
            <button onClick={onCancel} className="flex-1 rounded-2xl bg-slate-700 py-3.5 text-slate-300 font-semibold hover:bg-slate-600">Annuleer</button>
            <button onClick={() => onSave({ playerId, type, minute: minute ? parseInt(minute) : null })} disabled={!playerId}
              className={`flex-1 rounded-2xl ${c.solid} py-3.5 text-white font-bold disabled:opacity-40 active:scale-95`}>Opslaan</button>
          </div>
        </Modal>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // FINES TAB (boete-pot per team)
    // ════════════════════════════════════════════════════════════════
    function FinesTab({ team, theme, persist, setModal }) {
      const c = COLORS[theme];
      const fines = team.fines || { rules: [], entries: [] };
      const [view, setView] = useState('list'); // 'list' | 'rules'

      const totals = (fines.entries || []).reduce((acc, e) => {
        acc.total += e.amount;
        if (e.paid) acc.paid += e.amount; else acc.owed += e.amount;
        return acc;
      }, { total: 0, paid: 0, owed: 0 });

      const perPlayer = team.players.map(p => {
        const entries = fines.entries.filter(e => e.playerId === p.id);
        const owed = entries.filter(e => !e.paid).reduce((s, e) => s + e.amount, 0);
        const paid = entries.filter(e => e.paid).reduce((s, e) => s + e.amount, 0);
        return { player: p, entries, owed, paid, total: owed + paid };
      }).filter(x => x.total > 0).sort((a, b) => b.owed - a.owed);

      const togglePaid = (entryId) => {
        const next = { ...fines, entries: fines.entries.map(e => e.id === entryId ? { ...e, paid: !e.paid } : e) };
        persist({ ...team, fines: next });
      };
      const removeEntry = (entryId) => {
        const next = { ...fines, entries: fines.entries.filter(e => e.id !== entryId) };
        persist({ ...team, fines: next });
      };
      const addEntry = () => {
        if (fines.rules.length === 0) return;
        setModal(<AddFineModal team={team} theme={theme}
          onSave={(entry) => {
            const next = { ...fines, entries: [{ id: db.uid(), date: Date.now(), paid: false, ...entry }, ...fines.entries] };
            persist({ ...team, fines: next });
            setModal(null);
          }}
          onCancel={() => setModal(null)} />);
      };
      const addRule = () => {
        setModal(<AddRuleModal theme={theme}
          onSave={(rule) => {
            const next = { ...fines, rules: [...fines.rules, { id: db.uid(), ...rule }] };
            persist({ ...team, fines: next });
            setModal(null);
          }}
          onCancel={() => setModal(null)} />);
      };
      const removeRule = (id) => {
        const next = { ...fines, rules: fines.rules.filter(r => r.id !== id) };
        persist({ ...team, fines: next });
      };

      return (
        <div className="space-y-4">
          {/* Totaal-card */}
          <div className={`rounded-2xl bg-gradient-to-br ${c.bg} p-5 text-white`}>
            <p className="text-xs font-bold uppercase tracking-widest opacity-80">Totale pot</p>
            <p className="mt-1 text-4xl font-black tabular-nums">€ {totals.total.toFixed(2).replace('.', ',')}</p>
            <div className="mt-3 grid grid-cols-2 gap-3">
              <div className="rounded-xl bg-white/15 p-2 text-center">
                <p className="text-lg font-black tabular-nums">€ {totals.paid.toFixed(2).replace('.', ',')}</p>
                <p className="text-[10px] uppercase tracking-wider opacity-80 font-bold">betaald ✓</p>
              </div>
              <div className="rounded-xl bg-white/15 p-2 text-center">
                <p className="text-lg font-black tabular-nums">€ {totals.owed.toFixed(2).replace('.', ',')}</p>
                <p className="text-[10px] uppercase tracking-wider opacity-80 font-bold">openstaand</p>
              </div>
            </div>
          </div>

          {/* Mini-tabs */}
          <div className="flex gap-1 p-1 rounded-2xl bg-slate-800/80 border border-slate-700">
            <button onClick={() => setView('list')}
              className={`flex-1 rounded-xl py-2 text-xs font-bold transition-all ${view === 'list' ? `${c.solid} text-white` : 'text-slate-400'}`}>
              Boetes ({fines.entries.length})
            </button>
            <button onClick={() => setView('rules')}
              className={`flex-1 rounded-xl py-2 text-xs font-bold transition-all ${view === 'rules' ? `${c.solid} text-white` : 'text-slate-400'}`}>
              Regels ({fines.rules.length})
            </button>
          </div>

          {view === 'list' && (
            <>
              <button onClick={addEntry} disabled={fines.rules.length === 0}
                className={`w-full rounded-2xl ${c.solid} py-3.5 text-white font-bold flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50`}>
                <Plus size={18} /> Boete toevoegen
              </button>

              {/* Per speler ranking */}
              {perPlayer.length > 0 && (
                <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
                  <p className="mb-3 text-xs font-bold uppercase tracking-widest text-slate-500">Per speler</p>
                  <div className="space-y-1.5">
                    {perPlayer.map(s => (
                      <div key={s.player.id} className="flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-2.5">
                        <div className={`flex h-9 w-9 shrink-0 items-center justify-center rounded-full ${c.solid} text-white font-black text-sm`}>
                          {s.player.number || initials(s.player.name)}
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-white font-semibold text-sm truncate">{s.player.name}</p>
                          <p className="text-xs text-slate-500">{s.entries.length} boete{s.entries.length !== 1 ? 's' : ''}</p>
                        </div>
                        <div className="text-right">
                          {s.owed > 0 ? (
                            <p className="text-red-400 font-black tabular-nums">€ {s.owed.toFixed(2).replace('.', ',')}</p>
                          ) : (
                            <p className="text-green-400 font-black tabular-nums">✓</p>
                          )}
                          {s.paid > 0 && <p className="text-[10px] text-slate-500">€ {s.paid.toFixed(2).replace('.', ',')} betaald</p>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Recente boetes */}
              {fines.entries.length > 0 ? (
                <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
                  <p className="mb-3 text-xs font-bold uppercase tracking-widest text-slate-500">Recent</p>
                  <div className="space-y-1.5">
                    {fines.entries.slice(0, 20).map(e => {
                      const player = team.players.find(p => p.id === e.playerId);
                      const rule = fines.rules.find(r => r.id === e.ruleId);
                      return (
                        <div key={e.id} className={`flex items-center gap-3 rounded-xl px-3 py-2.5 ${e.paid ? 'bg-green-500/10 border border-green-500/20' : 'bg-slate-700/40'}`}>
                          <button onClick={() => togglePaid(e.id)}
                            className={`flex h-6 w-6 shrink-0 items-center justify-center rounded-md border-2 ${e.paid ? 'bg-green-500 border-green-500' : 'border-slate-600 hover:border-slate-500'}`}>
                            {e.paid && <CheckCircle size={13} className="text-white" />}
                          </button>
                          <div className="flex-1 min-w-0">
                            <p className={`text-sm font-semibold ${e.paid ? 'text-slate-500 line-through' : 'text-white'}`}>
                              {player?.name || '—'} · {rule?.label || e.label || '?'}
                            </p>
                            {e.reason && <p className="text-xs text-slate-500 truncate">{e.reason}</p>}
                          </div>
                          <span className={`font-black tabular-nums ${e.paid ? 'text-slate-500 line-through' : 'text-white'}`}>
                            € {e.amount.toFixed(2).replace('.', ',')}
                          </span>
                          <button onClick={() => removeEntry(e.id)} className="text-slate-600 hover:text-red-400 p-1">
                            <X size={13} />
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="rounded-2xl bg-slate-800 border border-slate-700 p-10 text-center">
                  <div className="text-5xl mb-3">💰</div>
                  <p className="text-white font-bold mb-1">Pot is leeg</p>
                  <p className="text-slate-500 text-sm">Voeg een boete toe via de knop hierboven.</p>
                </div>
              )}
            </>
          )}

          {view === 'rules' && (
            <div className="space-y-3">
              <button onClick={addRule}
                className={`w-full rounded-2xl ${c.solid} py-3.5 text-white font-bold flex items-center justify-center gap-2 active:scale-95`}>
                <Plus size={18} /> Regel toevoegen
              </button>
              <div className="rounded-2xl border border-slate-700 bg-slate-800 p-5">
                <p className="mb-3 text-xs font-bold uppercase tracking-widest text-slate-500">Boete-regels</p>
                {fines.rules.length === 0 ? (
                  <p className="py-4 text-center text-sm text-slate-500">Nog geen regels</p>
                ) : (
                  <div className="space-y-1.5">
                    {fines.rules.map(r => (
                      <div key={r.id} className="flex items-center gap-3 rounded-xl bg-slate-700/40 px-3 py-2.5">
                        <span className={`${c.solid} text-white font-black text-xs px-2 py-1 rounded-md tabular-nums`}>
                          € {r.amount.toFixed(2).replace('.', ',')}
                        </span>
                        <span className="flex-1 text-white font-medium text-sm">{r.label}</span>
                        <button onClick={() => removeRule(r.id)} className="text-slate-500 hover:text-red-400 p-1">
                          <Trash2 size={13} />
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    function AddFineModal({ team, theme, onSave, onCancel }) {
      const c = COLORS[theme];
      const fines = team.fines || { rules: [] };
      const [playerId, setPlayerId] = useState(null);
      const [ruleId, setRuleId] = useState(fines.rules[0]?.id || null);
      const [reason, setReason] = useState('');
      const [picking, setPicking] = useState(false);
      const player = team.players.find(p => p.id === playerId);
      const rule = fines.rules.find(r => r.id === ruleId);

      if (picking) return (
        <PlayerPicker title="Wie krijgt de boete?" players={team.players} selected={playerId} theme={theme}
          onPick={(id) => { setPlayerId(id); setPicking(false); }}
          onCancel={() => setPicking(false)} />
      );

      return (
        <Modal onClose={onCancel}>
          <h3 className="text-white font-bold text-lg mb-4">💰 Boete toevoegen</h3>

          <button onClick={() => setPicking(true)}
            className="w-full mb-3 flex items-center gap-3 rounded-xl border-2 border-dashed border-slate-600 bg-slate-700/40 px-4 py-3 text-left">
            <Users size={16} className={player ? c.text : 'text-slate-500'} />
            <div className="flex-1">
              <p className="text-xs font-bold uppercase text-slate-500">Speler</p>
              <p className={`font-bold ${player ? 'text-white' : 'text-slate-500'}`}>{player?.name || 'Tap om te kiezen'}</p>
            </div>
          </button>

          <p className="text-xs font-bold uppercase text-slate-500 mb-2">Reden</p>
          <div className="space-y-1.5 mb-3 max-h-[40vh] overflow-y-auto no-scrollbar">
            {fines.rules.map(r => (
              <button key={r.id} onClick={() => setRuleId(r.id)}
                className={`w-full flex items-center gap-3 rounded-xl px-3 py-2.5 text-left transition-all ${ruleId === r.id ? `${c.solid} text-white` : 'bg-slate-700/40 hover:bg-slate-700'}`}>
                <span className={`font-black text-xs px-2 py-1 rounded-md tabular-nums ${ruleId === r.id ? 'bg-white/20' : c.solid + ' text-white'}`}>
                  € {r.amount.toFixed(2).replace('.', ',')}
                </span>
                <span className={`flex-1 font-semibold text-sm ${ruleId === r.id ? 'text-white' : 'text-white'}`}>{r.label}</span>
                {ruleId === r.id && <CheckCircle size={16} />}
              </button>
            ))}
          </div>

          <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Toelichting (optioneel)</p>
          <input type="text" placeholder="bv. 5 min te laat" value={reason} onChange={(e) => setReason(e.target.value)} maxLength={60}
            className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-sm text-white outline-none focus:border-${theme}-500`} />

          <div className="mt-5 flex gap-3">
            <button onClick={onCancel} className="flex-1 rounded-2xl bg-slate-700 py-3.5 text-slate-300 font-semibold hover:bg-slate-600">Annuleer</button>
            <button onClick={() => onSave({ playerId, ruleId, label: rule?.label, amount: rule?.amount || 0, reason: reason.trim() })}
              disabled={!playerId || !rule}
              className={`flex-1 rounded-2xl ${c.solid} py-3.5 text-white font-bold disabled:opacity-40 active:scale-95`}>Opslaan</button>
          </div>
        </Modal>
      );
    }

    function AddRuleModal({ theme, onSave, onCancel }) {
      const c = COLORS[theme];
      const [label, setLabel] = useState('');
      const [amount, setAmount] = useState('');
      const ref = useRef(null);
      useEffect(() => { setTimeout(() => ref.current?.focus(), 60); }, []);
      const valid = label.trim() && parseFloat(amount) > 0;

      return (
        <Modal onClose={onCancel}>
          <h3 className="text-white font-bold text-lg mb-4">Nieuwe regel</h3>

          <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Omschrijving</p>
          <input ref={ref} type="text" placeholder="bv. Mobiel in kleedkamer" value={label} onChange={(e) => setLabel(e.target.value)} maxLength={40}
            className={`w-full mb-3 rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-sm text-white outline-none focus:border-${theme}-500`} />

          <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Bedrag (€)</p>
          <input type="number" inputMode="decimal" placeholder="bv. 2,50" value={amount}
            onChange={(e) => setAmount(e.target.value.replace(',', '.'))} step="0.50" min="0"
            className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-sm text-white outline-none focus:border-${theme}-500`} />

          <div className="mt-5 flex gap-3">
            <button onClick={onCancel} className="flex-1 rounded-2xl bg-slate-700 py-3.5 text-slate-300 font-semibold hover:bg-slate-600">Annuleer</button>
            <button onClick={() => valid && onSave({ label: label.trim(), amount: parseFloat(amount) })} disabled={!valid}
              className={`flex-1 rounded-2xl ${c.solid} py-3.5 text-white font-bold disabled:opacity-40 active:scale-95`}>Opslaan</button>
          </div>
        </Modal>
      );
    }

    // ── WEDSTRIJD BEWERKEN MODAL ─────────────────────
    function EditMatchModal({ match, theme, onSave, onCancel }) {
      const c = COLORS[theme];
      const [form, setForm] = useState({
        opponent: match.opponent,
        date: match.date,
        time: match.time,
        location: match.location,
      });
      const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));
      const isValid = form.opponent.trim() && form.date && form.time && form.location.trim();
      return (
        <Modal onClose={onCancel}>
          <h3 className="text-white font-bold text-lg mb-4">Wedstrijd bewerken</h3>
          <div className="space-y-3 mb-5">
            <div>
              <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Tegenstander</p>
              <input type="text" value={form.opponent} onChange={set('opponent')} placeholder="bv. FC Tegenstand"
                className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-white outline-none text-sm focus:border-${theme}-500`} />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Datum</p>
                <input type="date" value={form.date} onChange={set('date')}
                  className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-3 py-2.5 text-sm text-white outline-none focus:border-${theme}-500`} />
              </div>
              <div>
                <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Aanvang</p>
                <input type="time" value={form.time} onChange={set('time')}
                  className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-3 py-2.5 text-sm text-white outline-none focus:border-${theme}-500`} />
              </div>
            </div>
            <div>
              <p className="text-xs font-bold uppercase text-slate-500 mb-1.5">Locatie</p>
              <input type="text" value={form.location} onChange={set('location')} placeholder="bv. Sportpark Noord, veld 2"
                className={`w-full rounded-xl border border-slate-600 bg-slate-700 px-4 py-2.5 text-white outline-none text-sm focus:border-${theme}-500`} />
            </div>
          </div>
          <div className="flex gap-3">
            <button onClick={onCancel} className="flex-1 rounded-2xl bg-slate-700 py-3.5 text-slate-300 font-semibold hover:bg-slate-600">Annuleer</button>
            <button onClick={() => isValid && onSave({ ...form, opponent: form.opponent.trim(), location: form.location.trim() })} disabled={!isValid}
              className={`flex-1 rounded-2xl ${c.solid} py-3.5 text-white font-bold disabled:opacity-40 active:scale-95 transition-all`}>Opslaan</button>
          </div>
        </Modal>
      );
    }

    // ════════════════════════════════════════════════════════════════
    // ROOT
    // ════════════════════════════════════════════════════════════════
    function App() {
      const { hash, go } = useRouter();
      const route = parseRoute(hash);
      const [refreshKey, setRefreshKey] = useState(0);
      const refresh = () => setRefreshKey(k => k + 1);

      if (route.name === 'home')     return <WelcomeView onCreateTeam={() => go('#new-team')} onOpenTeam={(id) => go(`#team-${id}`)} />;
      if (hash === '#new-team')      return <CreateTeamView onCreated={(id) => go(`#team-${id}`)} onBack={() => go('')} />;
      if (route.name === 'team')     return <TeamDashboard refreshKey={refreshKey} teamId={route.teamId}
                                              onBack={() => go('')}
                                              onCreateMatch={() => go(`#team-${route.teamId}/new-match`)}
                                              onOpenMatch={(id) => go(`#match-${id}`)} />;
      if (route.name === 'newMatch') {
        const team = db.getTeam(route.teamId);
        if (!team) { go(''); return null; }
        return <CreateMatchView team={team} onCreated={(id) => go(`#match-${id}`)} onBack={() => go(`#team-${route.teamId}`)} />;
      }
      if (route.name === 'match') {
        const m = db.getMatch(route.matchId);
        return <MatchView matchId={route.matchId} onTeamUpdated={refresh}
                  onBack={() => go(m?.teamId ? `#team-${m.teamId}` : '')} />;
      }
      return <WelcomeView onCreateTeam={() => go('#new-team')} onOpenTeam={(id) => go(`#team-${id}`)} />;
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
