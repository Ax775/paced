/* ====================================================================
   cycle.js
   ==================================================================== */

const PHASES = { MENSTRUAL:'menstrual', FOLLICULAR:'follicular', OVULATORY:'ovulatory', LUTEAL:'luteal' };

const REFERENCE_28 = {
  [PHASES.MENSTRUAL]:5, [PHASES.FOLLICULAR]:8, [PHASES.OVULATORY]:3, [PHASES.LUTEAL]:12,
};

const PHASE_META = {
  [PHASES.MENSTRUAL]:  { label:'Menstrual',  subtitle:'Rest & restore',   blurb:'Energy is naturally lower. Honour it — warm, iron-rich meals and gentle movement.', accent:'terracotta', hue:'#C78264', bg:'#F4E2D8' },
  [PHASES.FOLLICULAR]: { label:'Follicular', subtitle:'Rise & create',    blurb:'Estrogen climbs and so does energy. Fresh, light foods and new experiments land well.', accent:'sage', hue:'#87A074', bg:'#E2E9DC' },
  [PHASES.OVULATORY]:  { label:'Ovulatory',  subtitle:'Peak & connect',   blurb:'Peak estrogen, peak energy. Fibre and anti-inflammatory foods support a smooth transition.', accent:'sage', hue:'#6B8559', bg:'#E2E9DC' },
  [PHASES.LUTEAL]:     { label:'Luteal',     subtitle:'Nourish & ground', blurb:'Your body burns more fuel now. Extra calories, complex carbs, and magnesium are your friends.', accent:'terracotta', hue:'#B06849', bg:'#EDE6D3' },
};

const MS_PER_DAY = 864e5;

function atMidnight(input) {
  const d = input instanceof Date ? new Date(input) : new Date(String(input));
  d.setHours(0,0,0,0); return d;
}

function daysBetween(a,b) {
  return Math.floor((atMidnight(b).getTime() - atMidnight(a).getTime()) / MS_PER_DAY);
}

function toISODate(input = new Date()) {
  const d = input instanceof Date ? new Date(input) : new Date(String(input));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function clampCycleLength(n) {
  const v = Number(n); if (!Number.isFinite(v)) return 28;
  return Math.min(45, Math.max(21, Math.round(v)));
}

function buildPhaseMap(cycleLength) {
  const len = clampCycleLength(cycleLength);
  const menstrual = REFERENCE_28[PHASES.MENSTRUAL];
  const remaining = len - menstrual;
  const nonMenstrualRef = REFERENCE_28[PHASES.FOLLICULAR]+REFERENCE_28[PHASES.OVULATORY]+REFERENCE_28[PHASES.LUTEAL];
  const follicular = Math.round((REFERENCE_28[PHASES.FOLLICULAR]/nonMenstrualRef)*remaining);
  const ovulatory  = Math.max(2, Math.round((REFERENCE_28[PHASES.OVULATORY]/nonMenstrualRef)*remaining));
  const luteal = remaining - follicular - ovulatory;
  const lengths = { [PHASES.MENSTRUAL]:menstrual, [PHASES.FOLLICULAR]:follicular, [PHASES.OVULATORY]:ovulatory, [PHASES.LUTEAL]:luteal };
  const order = [PHASES.MENSTRUAL, PHASES.FOLLICULAR, PHASES.OVULATORY, PHASES.LUTEAL];
  let cursor = 1;
  return order.map(phase => { const length=lengths[phase]; const startDay=cursor; const endDay=cursor+length-1; cursor=endDay+1; return {phase,startDay,endDay,length}; });
}

function phaseForCycleDay(cycleDay, cycleLength) {
  const map = buildPhaseMap(cycleLength);
  for (const slot of map) { if (cycleDay>=slot.startDay && cycleDay<=slot.endDay) return slot.phase; }
  return PHASES.LUTEAL;
}

function currentCycleDay(lastPeriodStart, cycleLength, today = new Date()) {
  const len = clampCycleLength(cycleLength);
  const diff = daysBetween(lastPeriodStart, today);
  return ((diff % len) + len) % len + 1;
}

function getCycleState(profile, today = new Date()) {
  const cycleLength = clampCycleLength(profile?.cycleLength ?? 28);
  const start = profile?.lastPeriodStart;
  if (!start) return { cycleLength, cycleDay:null, phase:PHASES.FOLLICULAR, phaseMeta:PHASE_META[PHASES.FOLLICULAR], phaseMap:buildPhaseMap(cycleLength), daysUntilNext:null, progressPct:0, hasData:false };
  const cycleDay = currentCycleDay(start, cycleLength, today);
  const phase = phaseForCycleDay(cycleDay, cycleLength);
  return { cycleLength, cycleDay, phase, phaseMeta:PHASE_META[phase], phaseMap:buildPhaseMap(cycleLength), daysUntilNext:Math.max(0,cycleLength-cycleDay+1)%cycleLength||cycleLength, progressPct:Math.round((cycleDay/cycleLength)*100), hasData:true };
}

const SAME_PERIOD_GUARD_DAYS = 10;
const LEARN_WINDOW = 4;

function learnedCycleLength(history, fallback) {
  if (!Array.isArray(history)||history.length<2) return fallback;
  const recent = history.slice(-LEARN_WINDOW); const gaps = [];
  for (let i=1;i<recent.length;i++) gaps.push(daysBetween(recent[i-1],recent[i]));
  return clampCycleLength(Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length));
}

function logPeriodStart(profile, today = new Date()) {
  if (!profile) return profile;
  const dateISO = toISODate(today);
  const seed = profile.lastPeriodStart ? toISODate(profile.lastPeriodStart) : null;
  const set = new Set(Array.isArray(profile.periodHistory)?profile.periodHistory:[]);
  if (seed) set.add(seed);
  if (set.has(dateISO)) return profile;
  const history = Array.from(set).sort();
  const last = history[history.length-1];
  if (last && daysBetween(last,dateISO)<SAME_PERIOD_GUARD_DAYS) return profile;
  history.push(dateISO);
  return { ...profile, periodHistory:history, lastPeriodStart:dateISO, cycleLength:learnedCycleLength(history,profile.cycleLength) };
}

function unlogPeriodStart(profile, today = new Date()) {
  if (!profile?.periodHistory?.length) return profile;
  const dateISO = toISODate(today);
  const idx = profile.periodHistory.lastIndexOf(dateISO);
  if (idx===-1) return profile;
  const history = profile.periodHistory.slice(); history.splice(idx,1);
  const lastPeriodStart = history.length ? history[history.length-1] : profile.lastPeriodStart;
  return { ...profile, periodHistory:history, lastPeriodStart, cycleLength:learnedCycleLength(history,profile.cycleLength) };
}

function isPeriodLoggedOn(profile, day = new Date()) {
  if (!Array.isArray(profile?.periodHistory)) return false;
  return profile.periodHistory.includes(toISODate(day));
}

function getCycleHistory(profile, max=4) {
  const h = Array.isArray(profile?.periodHistory)?profile.periodHistory:[];
  if (h.length<2) return [];
  const gaps = [];
  for (let i=1;i<h.length;i++) gaps.push({start:h[i-1],end:h[i],length:daysBetween(h[i-1],h[i])});
  return gaps.slice(-Math.max(1,max));
}

/* ====================================================================
   nutrition.js
   ==================================================================== */

function _num(v) { const n=Number(v); return Number.isFinite(n)&&n>0?n:0; }

function calcBMR({weightKg,heightCm,age}) {
  const w=_num(weightKg),h=_num(heightCm),a=_num(age);
  if (!w||!h||!a) return 0; return Math.round(10*w+6.25*h-5*a-161);
}

const ACTIVITY_LEVELS = [
  {id:'sedentary',label:'Sedentary',hint:'Mostly desk-bound',mult:1.2},
  {id:'light',label:'Lightly active',hint:'1–3 gentle sessions / wk',mult:1.375},
  {id:'moderate',label:'Moderate',hint:'3–5 sessions / wk',mult:1.55},
  {id:'active',label:'Active',hint:'6–7 sessions / wk',mult:1.725},
  {id:'very_active',label:'Very active',hint:'Athlete-level load',mult:1.9},
];

function activityMultiplier(id) { return ACTIVITY_LEVELS.find(l=>l.id===id)?.mult??1.2; }

function calcTDEE(profile) {
  return Math.round((calcBMR(profile)*activityMultiplier(profile.activityLevel))/10)*10;
}

const PHASE_DELTAS = {
  [PHASES.MENSTRUAL]:{kcal:0,proteinPerKg:1.7},[PHASES.FOLLICULAR]:{kcal:0,proteinPerKg:1.6},
  [PHASES.OVULATORY]:{kcal:50,proteinPerKg:1.7},[PHASES.LUTEAL]:{kcal:250,proteinPerKg:1.8},
};

const NUTRIENT_FOCUS = {
  [PHASES.MENSTRUAL]:  {headline:'Iron & warmth',foods:['Red lentils','Dark leafy greens','Beetroot','Grass-fed beef','Pumpkin seeds'],avoid:[],why:'Replenishing iron lost during menstruation supports steady energy and mood.'},
  [PHASES.FOLLICULAR]: {headline:'Fresh & fermented',foods:['Sauerkraut','Kefir','Sprouted grains','Citrus','Leafy salads'],avoid:[],why:'Rising estrogen pairs beautifully with light, probiotic-rich foods that gently support detox pathways.'},
  [PHASES.OVULATORY]:  {headline:'Fibre & antioxidants',foods:['Berries','Cruciferous veg','Flaxseed','Quinoa','Green tea'],avoid:[],why:'Fibre and cruciferous veg help your liver metabolise peak estrogen smoothly.'},
  [PHASES.LUTEAL]:     {headline:'Gut health & magnesium',foods:['Fermented foods','Sweet potato','Dark chocolate (70%+)','Pumpkin seeds','Oats'],avoid:[],why:'Progesterone slows digestion — fibre, fermented foods and magnesium keep your gut calm and cravings balanced.'},
};

function getDailyTargets(profile, phase) {
  const baseTDEE=calcTDEE(profile); const delta=PHASE_DELTAS[phase]??PHASE_DELTAS[PHASES.FOLLICULAR]; const weightKg=_num(profile.weightKg);
  return { baseTDEE, calories:baseTDEE+delta.kcal, calorieDelta:delta.kcal, protein:Math.round(weightKg*delta.proteinPerKg), proteinPerKg:delta.proteinPerKg, hydrationL:Math.max(2.0,+(weightKg*0.033).toFixed(1)), focus:NUTRIENT_FOCUS[phase] };
}

const TIPS = {
  [PHASES.MENSTRUAL]:['A warm bowl of lentil soup today — iron plus comfort in one.','Rest is a nutrient too. Permission granted.','Swap your afternoon coffee for ginger tea; easier on a sensitive system.','Dark leafy greens with a squeeze of lemon boosts iron absorption ~3×.','Cramps? Magnesium-rich cacao and pumpkin seeds are a quiet remedy.'],
  [PHASES.FOLLICULAR]:['Try one fermented food today — a spoon of sauerkraut counts.','Estrogen is rising. Your creative brain is too — capture an idea.','Sprouted grains digest more gently and suit rising energy.','Add a handful of bitter greens; they gently support liver clearance.','This is a great phase to try a new recipe — your gut tolerates novelty best now.'],
  [PHASES.OVULATORY]:['Cruciferous veg + healthy fat supports smooth estrogen metabolism.','Hydrate generously — you may notice a natural warmth today.','Peak energy: schedule the harder workout, then refuel with protein.','A tablespoon of ground flax supports hormone balance — stir it into anything.','Berries with breakfast — antioxidants love ovulation.'],
  [PHASES.LUTEAL]:['Cravings are data, not weakness. Reach for sweet potato before sweet snacks.','Your body burns ~250 extra calories now. Eat to match, without guilt.','Dark chocolate (70%+) genuinely helps — magnesium, not marketing.','Slow down and add fibre: oats, chia, or a baked apple.','Salt a little extra today — progesterone thins sodium more than you think.','Fermented foods now will thank you through your next bleed.'],
};

function seedFromDate(date) {
  const iso=toISODate(date); let h=0;
  for (let i=0;i<iso.length;i++) h=(h*31+iso.charCodeAt(i))|0;
  return Math.abs(h);
}

function getDailyInsight(phase, date=new Date()) {
  const pool=TIPS[phase]??TIPS[PHASES.FOLLICULAR];
  const idx=seedFromDate(date)%pool.length;
  return {text:pool[idx],phase,date:toISODate(date)};
}

/* ====================================================================
   storage.js
   ==================================================================== */

const PROFILE_KEY='aura.profile'; const LOG_PREFIX='aura.log.';

function loadProfile()  { try{const r=localStorage.getItem(PROFILE_KEY);return r?JSON.parse(r):null}catch{return null} }
function saveProfile(p) { try{localStorage.setItem(PROFILE_KEY,JSON.stringify(p))}catch{} }
function clearProfile() { try{localStorage.removeItem(PROFILE_KEY)}catch{} }

function emptyLog() { return {protein:0,calories:0,hydration:0,gut:{probiotics:false,fiber:false,fermented:false}}; }
function loadLog(date=new Date()) { try{const r=localStorage.getItem(LOG_PREFIX+toISODate(date));if(!r)return emptyLog();return{...emptyLog(),...JSON.parse(r)}}catch{return emptyLog()} }
function saveLog(date,log) { try{localStorage.setItem(LOG_PREFIX+toISODate(date),JSON.stringify(log))}catch{} }

const Card = ({ className = '', children }) => (
  <div className={`rounded-xl3 bg-cream-50/80 backdrop-blur-sm shadow-soft border border-cream-200/60 ${className}`}>
    {children}
  </div>
);

const Label = ({ children }) => (
  <label className="block text-[11px] uppercase tracking-[0.14em] text-ink-400 font-medium mb-2">
    {children}
  </label>
);

const Field = ({ children }) => <div className="flex flex-col">{children}</div>;

const inputCx =
  'w-full rounded-xl border border-cream-200 bg-cream-50 px-4 py-3 text-ink-700 ' +
  'placeholder:text-ink-400/70 focus:outline-none focus:border-sage-300 focus:ring-2 ' +
  'focus:ring-sage-200/60 transition';

function useDailyLog(date = new Date()) {
  const key = toISODate(date);
  const [log, setLog] = useState(() => loadLog(date));
  useEffect(() => { setLog(loadLog(date)); }, [key]);
  const update = useCallback((patch) => {
    setLog((current) => {
      const next = { ...current, ...patch };
      if (patch.gut) next.gut = { ...current.gut, ...patch.gut };
      saveLog(date, next);
      return next;
    });
  }, [key]);
  return [log, update];
}

function SoftProgress({ value, target }) {
  const safeTarget = Math.max(1, target);
  const pct = Math.min(100, Math.round((value / safeTarget) * 100));
  const reached = value >= safeTarget;
  return (
    <div className="h-2 rounded-full bg-cream-200/80 overflow-hidden">
      <div
        className="h-full rounded-full transition-all duration-700 ease-out"
        style={{
          width: `${pct}%`,
          background: reached
            ? 'linear-gradient(90deg, #87A074 0%, #C78264 100%)'
            : '#A8BA98',
        }}
      />
    </div>
  );
}

function Chip({ children, onClick, ariaLabel }) {
  return (
    <button
      type="button"
      aria-label={ariaLabel}
      onClick={onClick}
      className="text-xs px-3 py-1.5 rounded-full bg-cream-100 border border-cream-200 text-ink-600 hover:bg-sage-100 hover:border-sage-200 hover:text-sage-700 active:scale-95 transition"
    >
      {children}
    </button>
  );
}

function NumberValue({ value, unit, target, onChange }) {
  return (
    <div className="flex items-baseline gap-1 font-display text-ink-700">
      <input
        inputMode="numeric"
        value={value}
        onChange={(e) => {
          const v = e.target.value.replace(/[^0-9]/g, '');
          onChange(v === '' ? 0 : Math.min(99999, Number(v)));
        }}
        className="w-[3.4rem] text-right bg-transparent text-[26px] leading-none focus:outline-none focus:text-sage-700"
        aria-label={`${unit} entered`}
      />
      <span className="text-ink-400 text-sm">/ {target} {unit}</span>
    </div>
  );
}

function TrackerRow({ icon: Icon, label, value, target, unit, increments, onAdd, onSet }) {
  return (
    <div>
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2">
          {Icon && <Icon className="w-3.5 h-3.5 text-ink-400" />}
          <div className="text-[11px] uppercase tracking-[0.14em] text-ink-400">{label}</div>
        </div>
        <NumberValue value={value} unit={unit} target={target} onChange={onSet} />
      </div>
      <SoftProgress value={value} target={target} />
      <div className="flex flex-wrap gap-2 mt-3">
        {increments.map((inc) => (
          <Chip key={inc} onClick={() => onAdd(inc)} ariaLabel={`Add ${inc} ${unit}`}>
            +{inc} {unit}
          </Chip>
        ))}
        {value > 0 && (
          <Chip onClick={() => onSet(0)} ariaLabel={`Reset ${label}`}>reset</Chip>
        )}
      </div>
    </div>
  );
}

function HydrationRow({ glasses, target, onChange }) {
  const slots = Array.from({ length: target }, (_, i) => i + 1);
  return (
    <div>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <Droplet className="w-3.5 h-3.5 text-ink-400" />
          <div className="text-[11px] uppercase tracking-[0.14em] text-ink-400">Hydration</div>
        </div>
        <div className="font-display text-ink-700 text-[20px] leading-none">
          {glasses}<span className="text-ink-400 text-sm"> / {target} glasses</span>
        </div>
      </div>
      <div className="flex gap-1.5 flex-wrap">
        {slots.map((slot) => {
          const filled = slot <= glasses;
          return (
            <button
              key={slot}
              type="button"
              aria-label={`Set hydration to ${slot} glasses`}
              onClick={() => onChange(filled && slot === glasses ? slot - 1 : slot)}
              className={`w-7 h-9 rounded-b-full rounded-t-md border transition active:scale-95 ${filled ? 'bg-sage-200 border-sage-300' : 'bg-cream-50 border-cream-200 hover:border-sage-200'}`}
            />
          );
        })}
      </div>
      <div className="text-[11px] text-ink-400 mt-2">
        Each glass ≈ 250 ml · tap to fill, tap the last filled to clear.
      </div>
    </div>
  );
}

function shortMonth(iso) {
  const d = new Date(`${iso}T00:00:00`);
  return d.toLocaleDateString(undefined, { month: 'short' }).toUpperCase();
}

function CycleHistoryStrip({ profile }) {
  const history = getCycleHistory(profile, 4);
  if (history.length === 0) return null;
  const avg = Math.round(history.reduce((sum, g) => sum + g.length, 0) / history.length);
  const barHeight = (len) => {
    const t = Math.min(1, Math.max(0, (len - 21) / 24));
    return 44 + Math.round(t * 48);
  };
  return (
    <Card className="p-6 mb-5 anim-fade-up">
      <div className="flex items-center justify-between mb-5">
        <div className="text-[11px] uppercase tracking-[0.18em] text-ink-400">Recent cycles</div>
        <div className="text-[11px] text-sage-600 bg-sage-100 px-2.5 py-1 rounded-full">avg {avg} days</div>
      </div>
      <div className="flex items-end justify-around gap-3 h-[120px] px-1">
        {history.map((gap) => (
          <div key={gap.start} className="flex-1 flex flex-col items-center justify-end min-w-0">
            <div className="font-display text-[15px] text-ink-700 mb-1 leading-none">
              {gap.length}<span className="text-[10px] text-ink-400 ml-0.5">d</span>
            </div>
            <div
              className="w-full max-w-[42px] rounded-t-xl shadow-soft"
              style={{
                height: `${barHeight(gap.length)}px`,
                background: 'linear-gradient(180deg, #C6D3BB 0%, #87A074 60%, #C78264 100%)',
              }}
              aria-label={`${gap.length} day cycle starting ${gap.start}`}
            />
            <div className="text-[10px] text-ink-400 uppercase tracking-wider mt-2">{shortMonth(gap.end)}</div>
          </div>
        ))}
      </div>
      <p className="text-[11px] text-ink-400 text-center mt-4 leading-relaxed">
        Cycle length naturally varies — Aura uses your rhythm, not a textbook 28.
      </p>
    </Card>
  );
}

function WeeklyHistoryStrip({ profile, todayLog }) {
  const days = useMemo(() => {
    const out = [];
    const today = new Date();
    for (let offset = 6; offset >= 0; offset--) {
      const d = new Date(today);
      d.setDate(today.getDate() - offset);
      const isToday = offset === 0;
      const log     = isToday ? todayLog : loadLog(d);
      const state   = getCycleState(profile, d);
      const targets = getDailyTargets(profile, state.phase);
      const waterTarget = Math.max(6, Math.round(targets.hydrationL * 4));
      out.push({
        date: d, isToday,
        phase: state.phase, phaseHue: state.phaseMeta.hue,
        pctCalories: pct(log.calories, targets.calories),
        pctProtein:  pct(log.protein,  targets.protein),
        pctWater:    pct(log.hydration, waterTarget),
      });
    }
    return out;
  }, [profile, todayLog]);

  const anyData = days.some((d) => d.pctCalories > 0 || d.pctProtein > 0 || d.pctWater > 0);
  if (!anyData) return null;

  return (
    <Card className="p-6 mb-5 anim-fade-up">
      <div className="flex items-center justify-between mb-5">
        <div className="text-[11px] uppercase tracking-[0.18em] text-ink-400">This week's nourishment</div>
        <div className="text-[11px] text-ink-400">Last 7 days</div>
      </div>
      <WeekBarRow label="Calories" values={days.map((d) => d.pctCalories)} />
      <WeekBarRow label="Protein"  values={days.map((d) => d.pctProtein)}  />
      <WeekBarRow label="Water"    values={days.map((d) => d.pctWater)}    />
      <div className="flex gap-1.5 mt-4">
        {days.map((d, i) => (
          <div key={i} className="flex-1 flex flex-col items-center">
            <div className={`text-[10px] uppercase tracking-wider ${d.isToday ? 'text-sage-700 font-semibold' : 'text-ink-400'}`}>
              {d.date.toLocaleDateString(undefined, { weekday: 'narrow' })}
            </div>
            {d.isToday && <div className="w-1 h-1 rounded-full bg-sage-500 mt-1" />}
          </div>
        ))}
      </div>
      <div className="flex gap-1.5 mt-3" aria-label="Cycle phase per day">
        {days.map((d, i) => (
          <div
            key={i}
            className="flex-1 h-[3px] rounded-full"
            style={{ background: d.phaseHue, opacity: 0.55 }}
            title={PHASE_META[d.phase].label}
          />
        ))}
      </div>
      <p className="text-[11px] text-ink-400 text-center mt-4 leading-relaxed">
        Targets shift with your cycle — these bars measure against each day's own phase.
      </p>
    </Card>
  );
}

function WeekBarRow({ label, values }) {
  return (
    <div className="mb-5 last:mb-0">
      <div className="flex items-center justify-between mb-2">
        <div className="text-[11px] uppercase tracking-[0.14em] text-ink-400">{label}</div>
      </div>
      <div className="flex items-end gap-1.5 h-[56px]">
        {values.map((v, i) => {
          const capped = Math.min(100, v);
          const reached = v >= 100;
          return (
            <div
              key={i}
              className="flex-1 h-full rounded-md bg-cream-200/60 relative overflow-hidden"
              aria-label={`${label} day ${i + 1}: ${Math.round(v)}% of target`}
            >
              <div
                className="absolute bottom-0 left-0 right-0 rounded-md transition-all duration-500"
                style={{
                  height: `${capped}%`,
                  background: reached
                    ? 'linear-gradient(180deg, #A8BA98 0%, #C78264 100%)'
                    : '#A8BA98',
                }}
              />
            </div>
          );
        })}
      </div>
    </div>
  );
}

function pct(value, target) {
  const t = Number(target); const v = Number(value);
  if (!Number.isFinite(t) || t <= 0) return 0;
  if (!Number.isFinite(v) || v <= 0) return 0;
  return (v / t) * 100;
}

function PeriodLogButton({ profile, onUpdateProfile }) {
  const loggedToday = isPeriodLoggedOn(profile);
  const cyclesTracked = profile.periodHistory?.length ?? 0;

  const handleLog = () => {
    const ok = confirm('Log today as the start of your period?\n\nAura will use this to learn your natural cycle length over time.');
    if (!ok) return;
    const next = logPeriodStart(profile);
    if (next === profile) return;
    onUpdateProfile(next);
  };

  const handleUndo = () => onUpdateProfile(unlogPeriodStart(profile));

  if (loggedToday) {
    return (
      <button
        type="button"
        onClick={handleUndo}
        className="mt-5 text-xs text-ink-400 hover:text-ink-600 underline decoration-dotted underline-offset-4 transition"
      >
        Period logged today · undo
      </button>
    );
  }

  return (
    <div className="mt-5 flex flex-col items-center gap-1.5">
      <button
        type="button"
        onClick={handleLog}
        className="text-xs px-4 py-2 rounded-full bg-sage-100 text-sage-700 border border-sage-200 hover:bg-sage-200 active:scale-95 transition flex items-center gap-2"
      >
        <span className="w-1.5 h-1.5 rounded-full bg-terracotta-400" />
        My period started today
      </button>
      {cyclesTracked > 0 && (
        <div className="text-[10px] uppercase tracking-wider text-ink-400/80">
          {cyclesTracked} {cyclesTracked === 1 ? 'cycle' : 'cycles'} tracked
        </div>
      )}
    </div>
  );
}

function GutChecklist({ gut, onToggle }) {
  const items = [
    { id:'probiotics', label:'Probiotics',     hint:'Yogurt, kefir, capsule…',           icon:Sparkles },
    { id:'fiber',      label:'Fibre-rich meal', hint:'Veg, legumes, whole grains',        icon:Wheat },
    { id:'fermented',  label:'Fermented food', hint:'Sauerkraut, kimchi, miso, kombucha', icon:Salad },
  ];
  return (
    <div className="space-y-2">
      {items.map(({ id, label, hint, icon: Icon }) => {
        const on = !!gut[id];
        return (
          <button
            key={id}
            type="button"
            onClick={() => onToggle(id)}
            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl border transition text-left active:scale-[0.99] ${on ? 'bg-sage-100 border-sage-300' : 'bg-cream-50 border-cream-200 hover:border-sage-200'}`}
          >
            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 transition ${on ? 'bg-sage-300 text-cream-50' : 'bg-cream-100 text-ink-400'}`}>
              {on ? <Check className="w-4 h-4" /> : <Icon className="w-4 h-4" />}
            </div>
            <div className="min-w-0">
              <div className={`text-sm font-medium ${on ? 'text-sage-700' : 'text-ink-600'}`}>{label}</div>
              <div className="text-xs text-ink-400 mt-0.5">{hint}</div>
            </div>
            {on && (
              <div className="ml-auto text-[10px] uppercase tracking-wider text-sage-600">Done</div>
            )}
          </button>
        );
      })}
    </div>
  );
}

function Onboarding({ onComplete }) {
  const [form, setForm] = useState({
    name:'', age:'', weightKg:'', heightCm:'', activityLevel:'moderate',
    cycleLength:28, lastPeriodStart:new Date().toISOString().slice(0,10),
  });
  const setField = (k) => (e) => setForm((f) => ({ ...f, [k]: e.target.value }));
  const canSubmit = form.age && form.weightKg && form.heightCm && form.lastPeriodStart;
  const submit = (e) => {
    e.preventDefault();
    if (!canSubmit) return;
    const profile = {
      ...form,
      age: Number(form.age), weightKg: Number(form.weightKg), heightCm: Number(form.heightCm),
      cycleLength: Number(form.cycleLength), createdAt: new Date().toISOString(),
    };
    saveProfile(profile);
    onComplete(profile);
  };
  return (
    <div className="min-h-dvh flex items-center justify-center px-5 py-10">
      <Card className="w-full max-w-md p-7 anim-fade-up">
        <div className="flex items-center gap-3 mb-6">
          <div className="w-11 h-11 rounded-2xl bg-sage-100 flex items-center justify-center">
            <Flower2 className="w-5 h-5 text-sage-600" />
          </div>
          <div>
            <div className="font-display text-2xl text-ink-700 leading-none">Aura</div>
            <div className="text-xs text-ink-400 mt-1">A calmer way to nourish.</div>
          </div>
        </div>
        <h1 className="font-display text-[26px] text-ink-700 leading-tight mb-1">Let's set your baseline.</h1>
        <p className="text-sm text-ink-500 mb-6">Bio-individuality first. Nothing here is about restriction — just a gentle starting point.</p>
        <form onSubmit={submit} className="space-y-5">
          <Field>
            <Label>Name (optional)</Label>
            <input className={inputCx} value={form.name} onChange={setField('name')} placeholder="e.g. Maya" />
          </Field>
          <div className="grid grid-cols-2 gap-4">
            <Field>
              <Label>Age</Label>
              <input className={inputCx} type="number" min="14" max="70" value={form.age} onChange={setField('age')} placeholder="28" />
            </Field>
            <Field>
              <Label>Cycle length</Label>
              <input className={inputCx} type="number" min="21" max="45" value={form.cycleLength} onChange={setField('cycleLength')} />
            </Field>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <Field>
              <Label>Weight (kg)</Label>
              <input className={inputCx} type="number" min="30" max="200" value={form.weightKg} onChange={setField('weightKg')} placeholder="62" />
            </Field>
            <Field>
              <Label>Height (cm)</Label>
              <input className={inputCx} type="number" min="120" max="220" value={form.heightCm} onChange={setField('heightCm')} placeholder="168" />
            </Field>
          </div>
          <Field>
            <Label>Activity level</Label>
            <div className="grid grid-cols-1 gap-2">
              {ACTIVITY_LEVELS.map((lvl) => {
                const active = form.activityLevel === lvl.id;
                return (
                  <button
                    type="button" key={lvl.id}
                    onClick={() => setForm((f) => ({ ...f, activityLevel: lvl.id }))}
                    className={`text-left px-4 py-3 rounded-xl border transition ${active ? 'bg-sage-100 border-sage-300 text-sage-700' : 'bg-cream-50 border-cream-200 text-ink-600 hover:border-sage-200'}`}
                  >
                    <div className="text-sm font-medium">{lvl.label}</div>
                    <div className="text-xs text-ink-400 mt-0.5">{lvl.hint}</div>
                  </button>
                );
              })}
            </div>
          </Field>
          <Field>
            <Label>First day of your last period</Label>
            <input className={inputCx} type="date" value={form.lastPeriodStart} onChange={setField('lastPeriodStart')} />
          </Field>
          <button
            type="submit" disabled={!canSubmit}
            className="w-full mt-2 rounded-xl bg-sage-500 text-cream-50 py-3.5 font-medium tracking-wide hover:bg-sage-600 transition disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2"
          >
            Begin <ArrowRight className="w-4 h-4" />
          </button>
        </form>
      </Card>
    </div>
  );
}

const PHASE_ICONS = {
  [PHASES.MENSTRUAL]:Moon, [PHASES.FOLLICULAR]:Leaf, [PHASES.OVULATORY]:Sun, [PHASES.LUTEAL]:Flower2,
};

function CycleRing({ state }) {
  const size = 220;
  const r = 92;
  const c = 2 * Math.PI * r;
  const progress = state.hasData ? state.progressPct / 100 : 0;
  const dashOffset = c * (1 - progress);

  const phaseArcs = useMemo(() => {
    let cursor = 0;
    return state.phaseMap.map((slot) => {
      const fraction = slot.length / state.cycleLength;
      const offset = c * (1 - cursor);
      cursor += fraction;
      return {
        phase:     slot.phase,
        hue:       PHASE_META[slot.phase].hue,
        dasharray: `${c * fraction} ${c * (1 - fraction)}`,
        offset,
      };
    });
  }, [state.phaseMap, state.cycleLength, c]);

  return (
    <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="-rotate-90">
        <defs>
          <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"  stopColor="#A8BA98" />
            <stop offset="100%" stopColor="#C78264" />
          </linearGradient>
        </defs>
        {phaseArcs.map((arc) => (
          <circle
            key={arc.phase}
            cx={size / 2} cy={size / 2} r={r}
            stroke={arc.hue} strokeWidth="14" strokeOpacity="0.22"
            fill="none"
            strokeDasharray={arc.dasharray} strokeDashoffset={arc.offset}
          />
        ))}
        <circle
          cx={size / 2} cy={size / 2} r={r}
          stroke="url(#ring-grad)" strokeWidth="14" strokeLinecap="round" fill="none"
          strokeDasharray={c} strokeDashoffset={dashOffset}
          style={{ transition: 'stroke-dashoffset 900ms cubic-bezier(0.22, 1, 0.36, 1)' }}
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-[11px] uppercase tracking-[0.18em] text-ink-400">Day</div>
        <div className="font-display text-[54px] leading-none text-ink-700">
          {state.cycleDay ?? '—'}
        </div>
        <div className="text-xs text-ink-400 mt-1">of {state.cycleLength}</div>
      </div>
    </div>
  );
}

function PhaseTimeline({ state }) {
  return (
    <div className="flex gap-1.5">
      {state.phaseMap.map((slot) => {
        const active = slot.phase === state.phase;
        const meta = PHASE_META[slot.phase];
        return (
          <div key={slot.phase} className="flex-1 flex flex-col items-center gap-1.5" style={{ flexGrow: slot.length }}>
            <div
              className={`h-1.5 w-full rounded-full transition ${active ? 'anim-breathe' : ''}`}
              style={{ background: active ? meta.hue : '#EDE6D3' }}
            />
            <div className={`text-[10px] uppercase tracking-wider ${active ? 'text-ink-600' : 'text-ink-400/70'}`}>
              {meta.label}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Dashboard({ profile, onUpdateProfile, onReset }) {
  const state   = useMemo(() => getCycleState(profile), [profile]);
  const targets = useMemo(() => getDailyTargets(profile, state.phase), [profile, state.phase]);
  const insight = useMemo(() => getDailyInsight(state.phase), [state.phase]);
  const PhaseIcon = PHASE_ICONS[state.phase];

  const [log, updateLog] = useDailyLog();
  const waterGlassTarget = Math.max(6, Math.round(targets.hydrationL * 4));

  const addProtein  = (g)    => updateLog({ protein:  Math.min(99999, log.protein  + g) });
  const setProtein  = (g)    => updateLog({ protein:  g });
  const addCalories = (kcal) => updateLog({ calories: Math.min(99999, log.calories + kcal) });
  const setCalories = (kcal) => updateLog({ calories: kcal });
  const setWater    = (g)    => updateLog({ hydration: Math.max(0, Math.min(waterGlassTarget, g)) });
  const toggleGut   = (id)   => updateLog({ gut: { [id]: !log.gut[id] } });

  return (
    <div className="min-h-dvh px-5 py-8 max-w-md mx-auto">
      <header className="flex items-center justify-between mb-7 anim-fade-up">
        <div>
          <div className="text-[11px] uppercase tracking-[0.18em] text-ink-400">Good day{profile.name ? `, ${profile.name}` : ''}</div>
          <h1 className="font-display text-[30px] leading-tight text-ink-700">Your Aura</h1>
        </div>
        <button
          onClick={onReset}
          aria-label="Settings"
          className="w-10 h-10 rounded-full bg-cream-100 border border-cream-200 flex items-center justify-center text-ink-500 hover:text-ink-700 transition"
        >
          <Settings className="w-4 h-4" />
        </button>
      </header>

      <Card className="p-6 mb-5 anim-fade-up">
        <div className="flex flex-col items-center">
          <CycleRing state={state} />
          <div className="flex items-center gap-2 mt-5">
            <PhaseIcon className="w-4 h-4" style={{ color: state.phaseMeta.hue }} />
            <div className="font-display text-xl text-ink-700">{state.phaseMeta.label}</div>
            <span className="text-ink-400">·</span>
            <div className="text-sm text-ink-500">{state.phaseMeta.subtitle}</div>
          </div>
          <p className="text-center text-sm text-ink-500 mt-3 leading-relaxed px-4">
            {state.phaseMeta.blurb}
          </p>
          <PeriodLogButton profile={profile} onUpdateProfile={onUpdateProfile} />
        </div>
        <div className="mt-6">
          <PhaseTimeline state={state} />
        </div>
      </Card>

      <CycleHistoryStrip profile={profile} />

      <Card className="p-6 mb-5 anim-fade-up">
        <div className="flex items-center justify-between mb-5">
          <div className="text-[11px] uppercase tracking-[0.18em] text-ink-400">Today's nourishment</div>
          {targets.calorieDelta > 0 && (
            <div className="text-[11px] text-sage-600 bg-sage-100 px-2.5 py-1 rounded-full">
              +{targets.calorieDelta} kcal for {state.phaseMeta.label.toLowerCase()}
            </div>
          )}
        </div>
        <div className="space-y-6">
          <TrackerRow label="Calories" value={log.calories} target={targets.calories} unit="kcal" increments={[100, 250, 500]} onAdd={addCalories} onSet={setCalories} />
          <TrackerRow label="Protein"  value={log.protein}  target={targets.protein}  unit="g"    increments={[10, 20, 30]}   onAdd={addProtein}  onSet={setProtein} />
          <HydrationRow glasses={log.hydration} target={waterGlassTarget} onChange={setWater} />
        </div>
      </Card>

      <WeeklyHistoryStrip profile={profile} todayLog={log} />

      <Card className="p-6 mb-5 anim-fade-up">
        <div className="flex items-center justify-between mb-4">
          <div className="text-[11px] uppercase tracking-[0.18em] text-ink-400">Gut health</div>
          <div className="text-[11px] text-ink-400">
            {Object.values(log.gut).filter(Boolean).length} of 3
          </div>
        </div>
        <GutChecklist gut={log.gut} onToggle={toggleGut} />
      </Card>

      <Card className="p-6 mb-5 anim-fade-up">
        <div className="text-[11px] uppercase tracking-[0.18em] text-ink-400 mb-2">Nutrient focus</div>
        <div className="font-display text-xl text-ink-700 mb-1">{targets.focus.headline}</div>
        <p className="text-sm text-ink-500 leading-relaxed mb-4">{targets.focus.why}</p>
        <div className="flex flex-wrap gap-2">
          {targets.focus.foods.map((f) => (
            <span key={f} className="text-xs px-3 py-1.5 rounded-full bg-cream-100 border border-cream-200 text-ink-600">
              {f}
            </span>
          ))}
        </div>
      </Card>

      <Card className="p-6 anim-fade-up">
        <div className="flex items-center gap-2 text-[11px] uppercase tracking-[0.18em] text-ink-400 mb-3">
          <Sparkles className="w-3.5 h-3.5" />
          Daily insight
        </div>
        <p className="font-display text-[19px] leading-snug text-ink-700">{insight.text}</p>
      </Card>

      <div className="text-center text-[11px] text-ink-400 mt-8 mb-2">
        Aura · preview · v0.6
      </div>
    </div>
  );
}

function App() {
  const [profile, setProfile] = useState(() => loadProfile());

  useEffect(() => {
    const onStorage = (e) => { if (e.key === 'aura.profile') setProfile(loadProfile()); };
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);

  if (!profile) return <Onboarding onComplete={setProfile} />;

  const updateProfile = (next) => {
    if (!next || next === profile) return;
    saveProfile(next);
    setProfile(next);
  };

  return (
    <Dashboard
      profile={profile}
      onUpdateProfile={updateProfile}
      onReset={() => {
        if (confirm('Reset your Aura profile? Your daily logs will be kept.')) {
          clearProfile();
          setProfile(null);
        }
      }}
    />
  );
}

createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
