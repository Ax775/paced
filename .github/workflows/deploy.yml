name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [gh-pages-local]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Optional: add a VITE_SENTRY_DSN repo secret to enable error
          # tracking. When unset the Sentry SDK is dead-code-eliminated.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Verify theme classes survived purge
        run: |
          for cls in from-orange-600 to-amber-500 bg-blue-500 text-green-400 border-red-500; do
            grep -q "$cls" dist/assets/*.css || { echo "::error::Missing theme class $cls in build output"; exit 1; }
          done
          echo "All theme classes present."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
