name: CI

# Runs on every PR targeting main and on every push to main itself.
# Validates that:
#   1. The Vitest suite still passes (catches regressions in cycle/nutrition
#      pure functions before they reach production).
#   2. The production build still succeeds (catches index.html template
#      drift — build.mjs asserts on the exact CDN/babel patterns it
#      needs to strip, so an accidental edit to index.html that breaks
#      one of those patterns fails CI loudly).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Allow only one CI run per branch at a time — newer pushes cancel the
# in-flight one to save runner minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test + build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Match the npm version that maintains the lockfile. npm@10 strips
      # cross-platform optional binaries (rolldown, esbuild) on lockfile
      # regen, breaking vitest@4's Linux runtime; npm@11 keeps them.
      - name: Pin npm to 11.x
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/app.js     || { echo "::error::dist/app.js missing";     exit 1; }
          test -f dist/styles.css || { echo "::error::dist/styles.css missing"; exit 1; }
          test -f dist/sw.js      || { echo "::error::dist/sw.js missing";      exit 1; }
          test -f dist/_headers   || { echo "::error::dist/_headers missing";   exit 1; }
          test -f dist/assets/fonts/inter-latin-wght-normal.woff2     || { echo "::error::Inter font missing";    exit 1; }
          test -f dist/assets/fonts/fraunces-latin-full-normal.woff2  || { echo "::error::Fraunces font missing"; exit 1; }
          # Sanity: production HTML must contain no external CDN refs.
          if grep -E "googleapis|gstatic|cdn\.tailwindcss\.com|esm\.sh|unpkg\.com" dist/index.html; then
            echo "::error::dist/index.html still references an external CDN"
            exit 1
          fi
          echo "✓ All expected build artefacts present, no external CDN refs"
