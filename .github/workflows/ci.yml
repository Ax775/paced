name: CI

# Runs on every PR targeting main and on every push to main itself.
# Validates that:
#   1. package-lock.json is in sync with package.json (lockfile-drift guard).
#   2. The Vitest suite still passes (catches regressions in the pure
#      cycle/nutrition/entitlement/badge functions before production).
#   3. The production build still succeeds (catches index.html template
#      drift — build.mjs asserts on the exact CDN/babel patterns it strips).
#
# Division of labour: this workflow GATES quality. Cloudflare Pages does the
# actual publish from its own Git integration (and per-branch PR previews) —
# we deliberately don't duplicate the deploy here. Supabase edge functions
# are deployed by deploy-functions.yml.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Allow only one CI run per branch at a time — newer pushes cancel the
# in-flight one to save runner minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test + build
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Match the npm version that maintains the lockfile. npm@10 strips
      # cross-platform optional binaries (rolldown, esbuild) on lockfile
      # regen, breaking vitest@4's Linux runtime; npm@11 keeps them.
      - name: Pin npm to 11.x
        run: npm install -g npm@11

      # Lockfile-drift guard. `npm ci` already fails on drift, but it dumps a
      # confusing diff; surface the real cause first. This is the exact
      # footgun that turned two earlier PRs red — deps added to package.json
      # without re-running `npm install` to update package-lock.json.
      - name: Verify lockfile in sync
        run: |
          npm ci --dry-run >/dev/null 2>&1 || {
            echo "::error::package-lock.json is out of sync with package.json — run 'npm install' and commit the updated lockfile";
            exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/app.js     || { echo "::error::dist/app.js missing";     exit 1; }
          test -f dist/styles.css || { echo "::error::dist/styles.css missing"; exit 1; }
          test -f dist/sw.js      || { echo "::error::dist/sw.js missing";      exit 1; }
          test -f dist/_headers   || { echo "::error::dist/_headers missing";   exit 1; }
          test -f dist/assets/fonts/inter-latin-wght-normal.woff2     || { echo "::error::Inter font missing";    exit 1; }
          test -f dist/assets/fonts/fraunces-latin-full-normal.woff2  || { echo "::error::Fraunces font missing"; exit 1; }
          # Sanity: production HTML must contain no external CDN refs.
          if grep -E "googleapis|gstatic|cdn\.tailwindcss\.com|esm\.sh|unpkg\.com" dist/index.html; then
            echo "::error::dist/index.html still references an external CDN"
            exit 1
          fi
          echo "✓ All expected build artefacts present, no external CDN refs"

      # Advisory: if app/shell code changed in a PR but the Service Worker
      # cache name (paced-shell-vN) wasn't bumped, returning users may keep a
      # stale shell. Warns, never blocks.
      - name: Service Worker cache-version reminder
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --quiet "origin/${{ github.base_ref }}" -- sw.js src/ index.html; then
            exit 0
          fi
          if git diff "origin/${{ github.base_ref }}" -- sw.js | grep -q "paced-shell-v"; then
            echo "✓ SW cache version bumped"
          else
            echo "::warning file=sw.js::App/shell code changed but the paced-shell-vN cache name in sw.js was not bumped — returning users may serve a stale shell."
          fi

  # Advisory Lighthouse budget — runs only post-merge on main so PRs stay
  # fast and a flaky perf run never blocks a merge. Promote to a required
  # check in branch protection once the budget in audit-lighthouse.mjs is
  # proven stable.
  lighthouse:
    name: Lighthouse budget (advisory)
    if: github.event_name == 'push'
    needs: test-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci
      - name: Lighthouse audit
        run: npm run audit
